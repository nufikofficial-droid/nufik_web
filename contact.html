<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Nūfik</title>
  <link rel="stylesheet" href="https://use.typekit.net/bvc3fac.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink:    #E7E7E7;
      --point:  #BBBBBB;
      --line:   #BBBBBB;
      --accent: #7B7B7B;
      --txt:    #7B7B7B;
    }

    body.theme-denim {
      --ink:    #C4DAE2;
      --point:  #D4EBF9;
      --line:   rgba(149,52,52,0.8);
      --accent: #953434;
      --txt:    #953434;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--ink);
      color: var(--txt);
      overflow-x: hidden;
    }

    /* 배경 블러 레이어 */
    .bg-blur {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translate(calc(-50% - 116px), 0);
      width: calc(100vw + 400px);
      min-width: 1280px;
      height: auto;
      pointer-events: none;
      z-index: 2;
    }

    /* ── side panels ── */
    .side-panel {
      position: fixed;
      top: 0; bottom: 0;
      z-index: 125;
      display: flex;
      align-items: stretch;
      pointer-events: none;
      opacity: 0.5;
    }
    .side-panel.left  { left: 0;  flex-direction: row; }
    .side-panel.right { right: 0; flex-direction: row-reverse; }
    .side-panel .sp-txt {
      width: 26px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 28px 0;
    }
    .side-panel .sp-txt span {
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--line);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      white-space: nowrap;
    }
    .side-panel .sp-line {
      width: 1px;
      background: var(--line);
    }
    @media (max-width: 768px) { .side-panel { display: none; } }

    /* ── nav-logo: 좌상단 고정 ── */
    .nav-logo {
      position: fixed;
      top: 0; left: 27px;
      width: calc((100% - 54px) / 3);
      padding: 30px;
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transition: opacity 460ms ease;
    }
    .nav-logo.visible { opacity: 1; pointer-events: auto; }
    .nav-logo svg { width: 120px; height: auto; display: block; }

    /* ── site-nav: 우상단 ── */
    .site-nav {
      position: fixed;
      top: 0;
      left: calc(27px + (100% - 54px) / 3.5 * 2.5);
      width: calc((100% - 54px) / 3.5);
      height: calc(100% / 3);
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transition: opacity 460ms ease;
    }
    .site-nav.visible { opacity: 1; pointer-events: none; }
    .site-nav.visible .nav-links { pointer-events: auto; }
    .nav-links {
      display: flex;
      flex-direction: row;
      align-items: center;
      list-style: none;
      padding: 0; margin: 0;
      gap: 1.2rem;
    }
    .nav-links a {
      font-family: "acumin-pro-condensed-black", sans-serif;
      font-weight: 800;
      font-size: clamp(16px, 1.4vw, 20px);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--txt);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--accent); }

    /* ── contact content layout ── */
    .content {
      position: relative;
      min-height: 100vh;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: calc(100% / 3.5) 1fr calc(100% / 3.5);
      padding: 0 27px;
      z-index: 10;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 540ms ease, transform 540ms cubic-bezier(0.22,1,0.36,1);
    }
    .content.visible { opacity: 1; transform: translateY(0); }

    .contact-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 100px 30px 80px;
      gap: 1.8rem;
    }
    .contact-title {
      font-family: "acumin-pro-condensed-black", sans-serif;
      font-weight: 800;
      font-size: clamp(20px, 2vw, 28px);
      line-height: 1.1;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--txt);
      margin-bottom: 0.6rem;
    }
    .contact-intro {
      font-family: lumios-typewriter-used, sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.7;
      letter-spacing: 0.06em;
      color: var(--txt);
      max-width: 28ch;
    }
    .contact-info-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .contact-info-label {
      font-family: lumios-typewriter-used, sans-serif;
      font-weight: 400;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: underline;
      text-underline-offset: 0.25em;
      color: color-mix(in srgb, var(--txt) 70%, transparent);
    }
    .contact-info-value {
      font-family: lumios-typewriter-used, sans-serif;
      font-weight: 400;
      font-size: 15px;
      letter-spacing: 0.05em;
      color: var(--txt);
    }
    .contact-info-value a {
      color: var(--txt);
      text-decoration: none;
      transition: color 0.3s;
    }
    .contact-info-value a:hover { color: var(--accent); }

    .contact-center { /* center column kept empty for grid balance */ }

    .contact-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 100px 30px 80px;
      gap: 1.4rem;
    }

    /* ── form ── */
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .form-label {
      font-family: lumios-typewriter-used, sans-serif;
      font-weight: 400;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: underline;
      text-underline-offset: 0.25em;
      color: color-mix(in srgb, var(--txt) 70%, transparent);
    }
    .form-input,
    .form-select,
    .form-textarea {
      font-family: lumios-typewriter-used, sans-serif;
      font-weight: 400;
      font-size: 15px;
      letter-spacing: 0.05em;
      color: var(--txt);
      background: transparent;
      border: none;
      border-bottom: 1px solid color-mix(in srgb, var(--line) 50%, transparent);
      padding: 0.5rem 0;
      outline: none;
      transition: border-color 300ms ease;
    }
    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      border-bottom-color: var(--txt);
    }
    .form-input::placeholder,
    .form-textarea::placeholder {
      color: color-mix(in srgb, var(--txt) 35%, transparent);
    }
    .form-textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.6;
    }
    .form-select {
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      background-image: linear-gradient(45deg, transparent 50%, var(--txt) 50%),
                        linear-gradient(135deg, var(--txt) 50%, transparent 50%);
      background-position: calc(100% - 12px) 50%, calc(100% - 7px) 50%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      padding-right: 24px;
    }
    .form-select option {
      background: var(--ink);
      color: var(--txt);
    }

    .submit-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      border: 1px solid var(--line);
      background: transparent;
      font-family: "acumin-pro-condensed-black", sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--line);
      cursor: pointer;
      transition: border-color 300ms ease, color 300ms ease;
      align-self: flex-start;
      margin-top: 0.6rem;
    }
    .submit-btn:hover:not(:disabled) {
      border-color: var(--txt);
      color: var(--txt);
    }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .form-status {
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 13px;
      letter-spacing: 0.05em;
      line-height: 1.6;
      color: var(--txt);
      min-height: 1.5em;
      margin-top: 0.4rem;
    }
    .form-status.success { color: var(--accent); }
    .form-status.error { color: #b94545; }

    /* ── theme toggle ── */
    #theme-toggle {
      position: fixed;
      right: calc(27px + 30px); bottom: 30px;
      z-index: 60;
      display: flex; align-items: center; gap: 0.5rem;
      opacity: 0;
      transition: opacity 460ms ease;
      cursor: pointer;
      pointer-events: auto;
    }
    #theme-toggle.visible { opacity: 1; }
    #theme-toggle span {
      font-family: "acumin-pro-condensed-black", sans-serif;
      font-weight: 800;
      font-size: 12px; letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--txt);
      transition: color 0.3s;
    }
    #theme-toggle:hover span { color: var(--accent); }
    .toggle-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--txt); opacity: 0.4;
      transition: opacity 0.3s;
    }
    #theme-toggle:hover .toggle-dot { opacity: 1; }

    /* ── mobile ── */
    @media (max-width: 768px) {
      .nav-logo {
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        padding: 20px;
        display: flex; justify-content: center; align-items: center;
        z-index: 200;
      }
      .nav-logo svg { width: 80px; }

      .site-nav {
        position: fixed;
        top: auto; bottom: 0;
        left: 0;
        width: 100%; height: auto;
        padding: 14px 20px 18px;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        z-index: 200;
        background: linear-gradient(transparent, var(--ink));
      }
      .nav-links {
        flex-direction: row;
        width: 100%;
        justify-content: space-between;
        gap: 0;
      }
      .nav-links a { font-size: 11px; }

      .content {
        grid-template-columns: 1fr;
        padding: 90px 24px 120px;
        gap: 2.4rem;
      }
      .contact-left,
      .contact-right {
        padding: 0;
      }
      #theme-toggle {
        right: auto;
        left: 50%;
        bottom: 70px;
        transform: translateX(-50%);
      }
    }
  </style>
</head>
<body>

<!-- side panels -->
<div class="side-panel left">
  <div class="sp-line"></div>
  <div class="sp-txt">
    <span>Some</span><span>brands</span><span>are</span><span>seen</span><span>Ours</span><span>are</span><span>felt</span>
  </div>
  <div class="sp-line"></div>
</div>
<div class="side-panel right">
  <div class="sp-line"></div>
  <div class="sp-txt">
    <span>Shaped</span><span>by</span><span>instinct</span><span>Sharpened</span><span>by</span><span>intent</span>
  </div>
  <div class="sp-line"></div>
</div>

<!-- background blur -->
<img class="bg-blur" src="src/bg_blur.svg" alt="" aria-hidden="true">

<!-- nav: logo + menu -->
<div class="nav-logo" id="navLogo">
  <a href="index.html" style="display:block;cursor:pointer;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 751.5 208.1">
      <defs><style>.st0 { fill: var(--txt,#953434); }</style></defs>
      <polygon class="st0" points="157.1 118.1 55.5 9 0 9 0 205.3 51 205.3 51 83 56.4 83 170.2 205.3 208.1 205.3 208.1 9 157.1 9 157.1 118.1"/>
      <path class="st0" d="M333.9,129c0,7.3-1.4,13.7-4.1,19.1-2.7,5.4-6.4,9.6-11.1,12.5-4.7,2.9-9.9,4.3-15.7,4.3s-14.2-2.5-18.5-7.4c-4.3-5-6.5-12.2-6.5-21.7v-70.7h-46.6v80.8c0,19.3,4.9,34.5,14.7,45.6,9.8,11.1,23,16.7,39.7,16.7s20.5-2.5,28.9-7.4c8-4.7,14.4-11.5,19.1-20.3v24.9s46.6,0,46.6,0V65.1h-46.6v63.9Z"/>
      <rect class="st0" x="257.1" y="9" width="99" height="32.5"/>
      <polygon class="st0" points="751.5 205.3 682.8 132.5 745.6 65.1 688.1 65.1 624.5 125.6 624.5 9 577.7 9 577.7 205.3 624.5 205.3 624.5 141.6 691.8 205.3 751.5 205.3"/>
      <path class="st0" d="M530.8,111.9h-23.4v-23.4h23.4v-23.4h-67.2v-4.8c0-6.9,2.2-12.3,6.6-16.1,4.4-3.8,11.8-5.8,22.3-5.8s16.8.8,25.8,2.4c9,1.6,17.8,3.9,26.4,6.9h.8V7.9c-7.1-2.2-15.7-4.1-25.8-5.6-10.1-1.5-19.4-2.2-28-2.2-16.8,0-30.9,2.5-42.1,7.4-11.2,5-19.5,11.9-24.8,20.9-5.3,9-8,19.5-8,31.7v5h-18.8v46.9h18.8v93.4h46.8v-93.4h43.8v93.4h46.8v-116.8h-23.4v23.4Z"/>
    </svg>
  </a>
</div>

<nav class="site-nav" id="siteNav">
  <ul class="nav-links">
    <li><a href="index.html">Work</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div id="theme-toggle">
  <div class="toggle-dot"></div>
  <span id="toggle-label">Denim Gray</span>
</div>

<!-- contact content -->
<div class="content" id="content">
  <div class="contact-left">
    <h1 class="contact-title">Let's make a boundless possibility</h1>
    <p class="contact-intro">For brand inquiries, collaborations, or a quiet hello — write to us. We'll get back within a few days.</p>

    <div class="contact-info-group">
      <div class="contact-info-label">Email</div>
      <div class="contact-info-value"><a href="mailto:hello@nufik.com">hello@nufik.com</a></div>
    </div>
    <div class="contact-info-group">
      <div class="contact-info-label">Based in</div>
      <div class="contact-info-value">Singapore, Korea</div>
    </div>
  </div>

  <div class="contact-center"></div>

  <div class="contact-right">
    <form class="contact-form" id="contactForm">
      <!-- Web3Forms access key -->
      <input type="hidden" name="access_key" value="fa75224f-e122-43bd-9e25-e711dfd4bea7">
      <input type="hidden" name="subject" value="New message from nufik.com">
      <input type="hidden" name="from_name" value="Nūfik Website">
      <!-- honeypot -->
      <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off">

      <div class="form-field">
        <label class="form-label" for="name">Name</label>
        <input class="form-input" type="text" id="name" name="name" required autocomplete="name">
      </div>

      <div class="form-field">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" name="email" required autocomplete="email">
      </div>

      <div class="form-field">
        <label class="form-label" for="interest">I'm interested in</label>
        <select class="form-select" id="interest" name="interest" required>
          <option value="" disabled selected>Select an option</option>
          <option value="Brand &amp; Design">Brand &amp; Design Services</option>
          <option value="Collaboration">Collaboration</option>
          <option value="Press">Press</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-field">
        <label class="form-label" for="message">Message</label>
        <textarea class="form-textarea" id="message" name="message" rows="4" required placeholder="Tell us a little about what you have in mind..."></textarea>
      </div>

      <button class="submit-btn" type="submit" id="submitBtn">Send Message</button>
      <div class="form-status" id="formStatus" aria-live="polite"></div>
    </form>
  </div>
</div>

<script>
  // Restore saved theme
  if (localStorage.getItem('theme') === 'denim') {
    document.body.classList.add('theme-denim');
  }
  const toggleLabel = document.getElementById('toggle-label');
  toggleLabel.textContent = document.body.classList.contains('theme-denim') ? 'Denim Blue' : 'Denim Gray';

  document.getElementById('theme-toggle').addEventListener('click', () => {
    document.body.classList.toggle('theme-denim');
    const isDenim = document.body.classList.contains('theme-denim');
    toggleLabel.textContent = isDenim ? 'Denim Blue' : 'Denim Gray';
    localStorage.setItem('theme', isDenim ? 'denim' : 'default');
  });

  // Reveal on load
  window.addEventListener('load', () => {
    setTimeout(() => document.getElementById('navLogo').classList.add('visible'), 80);
    setTimeout(() => document.getElementById('siteNav').classList.add('visible'), 160);
    setTimeout(() => document.getElementById('content').classList.add('visible'), 130);
    setTimeout(() => document.getElementById('theme-toggle').classList.add('visible'), 300);
  });

  // Form submission via Web3Forms
  const form   = document.getElementById('contactForm');
  const status = document.getElementById('formStatus');
  const submit = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    status.textContent = 'Sending...';
    status.classList.remove('success', 'error');
    submit.disabled = true;

    const formData = new FormData(form);
    try {
      const res = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      if (data.success) {
        status.textContent = 'Message sent. We will be in touch soon.';
        status.classList.add('success');
        form.reset();
      } else {
        status.textContent = data.message || 'Something went wrong. Please email us directly.';
        status.classList.add('error');
      }
    } catch (err) {
      status.textContent = 'Network error. Please try again or email hello@nufik.com.';
      status.classList.add('error');
    } finally {
      submit.disabled = false;
    }
  });
</script>

</body>
</html>

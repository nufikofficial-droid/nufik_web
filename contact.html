<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Nūfik</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;500;700;800;900&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/bvc3fac.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink:    #E7E7E7;
      --point:  #BBBBBB;
      --line:   #BBBBBB;
      --accent: #7B7B7B;
      --txt:    #7B7B7B;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--ink);
      color: var(--txt);
      overflow-x: hidden;
    }

    /* 배경 블러 레이어 */
    :root {
      --capsule-fill: rgba(255,255,255,0.4);
      --capsule-line: rgba(255,255,255,1);
      --dot:          rgba(123,123,123,0.18);
      --txt-strong:   #090909;
      --radius:       10px;
    }

    /* Background dot grid (shared with index) */
    .dot-grid {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1.5px);
      background-size: 32px 32px;
      background-position: 0 0;
    }

    /* Nav capsule (shared with index) */
    .nav-capsule {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: min(840px, calc(100% - 56px));
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4.2rem;
      padding: 12px 32px;
      background: var(--capsule-fill);
      border: 1px solid var(--capsule-line);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .nav-logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .nav-logo svg { width: 72px; height: auto; display: block; }
    .nav-logo svg .st0 { fill: var(--txt); }
    .nav-links {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 2.6rem;
      padding: 0; margin: 0;
    }
    .nav-links a {
      font-family: "Doto", sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--txt);
      text-decoration: none;
      transition: opacity 200ms ease, color 200ms ease;
    }
    .nav-links a.active { color: var(--txt-strong); font-weight: 900; }
    .nav-links a:not(.active):hover { color: var(--txt-strong); }

    /* ── contact content layout ── */
    .content {
      position: relative;
      min-height: 100vh;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: calc(100% / 3.5) 1fr calc(100% / 3.5);
      padding: 0 27px;
      z-index: 10;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 540ms ease, transform 540ms cubic-bezier(0.22,1,0.36,1);
    }
    .content.visible { opacity: 1; transform: translateY(0); }

    .contact-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 100px 30px 80px;
      gap: 1.8rem;
    }
    .contact-title {
      font-family: "acumin-pro-condensed-black", sans-serif;
      font-weight: 800;
      font-size: clamp(20px, 2vw, 28px);
      line-height: 1.1;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--txt);
      margin-bottom: 0.6rem;
    }
    .contact-intro {
      font-family: lumios-typewriter-used, sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.7;
      letter-spacing: 0.06em;
      color: var(--txt);
      max-width: 28ch;
    }
    .contact-info-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .contact-info-label {
      font-family: lumios-typewriter-used, sans-serif;
      font-weight: 400;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: underline;
      text-underline-offset: 0.25em;
      color: color-mix(in srgb, var(--txt) 70%, transparent);
    }
    .contact-info-value {
      font-family: lumios-typewriter-used, sans-serif;
      font-weight: 400;
      font-size: 15px;
      letter-spacing: 0.05em;
      color: var(--txt);
    }
    .contact-info-value a {
      color: var(--txt);
      text-decoration: none;
      transition: color 0.3s;
    }
    .contact-info-value a:hover { color: var(--accent); }

    .contact-center { /* center column kept empty for grid balance */ }

    .contact-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 100px 30px 80px;
      gap: 1.4rem;
    }

    /* ── form ── */
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .form-label {
      font-family: lumios-typewriter-used, sans-serif;
      font-weight: 400;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: underline;
      text-underline-offset: 0.25em;
      color: color-mix(in srgb, var(--txt) 70%, transparent);
    }
    .form-input,
    .form-select,
    .form-textarea {
      font-family: lumios-typewriter-used, sans-serif;
      font-weight: 400;
      font-size: 15px;
      letter-spacing: 0.05em;
      color: var(--txt);
      background: transparent;
      border: none;
      border-bottom: 1px solid color-mix(in srgb, var(--line) 50%, transparent);
      padding: 0.5rem 0;
      outline: none;
      transition: border-color 300ms ease;
    }
    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      border-bottom-color: var(--txt);
    }
    .form-input::placeholder,
    .form-textarea::placeholder {
      color: color-mix(in srgb, var(--txt) 35%, transparent);
    }
    .form-textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.6;
    }
    .form-select {
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      background-image: linear-gradient(45deg, transparent 50%, var(--txt) 50%),
                        linear-gradient(135deg, var(--txt) 50%, transparent 50%);
      background-position: calc(100% - 12px) 50%, calc(100% - 7px) 50%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      padding-right: 24px;
    }
    .form-select option {
      background: var(--ink);
      color: var(--txt);
    }

    .submit-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      border: 1px solid var(--line);
      background: transparent;
      font-family: "acumin-pro-condensed-black", sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--line);
      cursor: pointer;
      transition: border-color 300ms ease, color 300ms ease;
      align-self: flex-start;
      margin-top: 0.6rem;
    }
    .submit-btn:hover:not(:disabled) {
      border-color: var(--txt);
      color: var(--txt);
    }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .form-status {
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 13px;
      letter-spacing: 0.05em;
      line-height: 1.6;
      color: var(--txt);
      min-height: 1.5em;
      margin-top: 0.4rem;
    }
    .form-status.success { color: var(--accent); }
    .form-status.error { color: #b94545; }

    /* ── mobile ── */
    @media (max-width: 900px) {
      .nav-capsule {
        top: auto;
        bottom: 20px;
        width: calc(100% - 40px);
        gap: 20px;
        padding: 10px 20px;
      }
      .nav-logo svg { width: 60px; }
      .nav-links { gap: 24px; }
      .nav-links a { font-size: 13px; letter-spacing: 0.1em; }

      .dot-grid { background-size: 24px 24px; }

      .content {
        grid-template-columns: 1fr;
        padding: 100px 24px 140px;
        gap: 2.4rem;
      }
      .contact-left,
      .contact-right {
        padding: 0;
      }
    }
  </style>
</head>
<body>

<!-- background dot grid -->
<div class="dot-grid" aria-hidden="true"></div>

<!-- nav capsule -->
<header class="nav-capsule" role="banner">
  <a href="index.html" class="nav-logo" aria-label="Nufik home">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 751.5 208.1">
      <polygon class="st0" points="157.1 118.1 55.5 9 0 9 0 205.3 51 205.3 51 83 56.4 83 170.2 205.3 208.1 205.3 208.1 9 157.1 9 157.1 118.1"/>
      <path class="st0" d="M333.9,129c0,7.3-1.4,13.7-4.1,19.1-2.7,5.4-6.4,9.6-11.1,12.5-4.7,2.9-9.9,4.3-15.7,4.3s-14.2-2.5-18.5-7.4c-4.3-5-6.5-12.2-6.5-21.7v-70.7h-46.6v80.8c0,19.3,4.9,34.5,14.7,45.6,9.8,11.1,23,16.7,39.7,16.7s20.5-2.5,28.9-7.4c8-4.7,14.4-11.5,19.1-20.3v24.9s46.6,0,46.6,0V65.1h-46.6v63.9Z"/>
      <rect class="st0" x="257.1" y="9" width="99" height="32.5"/>
      <polygon class="st0" points="751.5 205.3 682.8 132.5 745.6 65.1 688.1 65.1 624.5 125.6 624.5 9 577.7 9 577.7 205.3 624.5 205.3 624.5 141.6 691.8 205.3 751.5 205.3"/>
      <path class="st0" d="M530.8,111.9h-23.4v-23.4h23.4v-23.4h-67.2v-4.8c0-6.9,2.2-12.3,6.6-16.1,4.4-3.8,11.8-5.8,22.3-5.8s16.8.8,25.8,2.4c9,1.6,17.8,3.9,26.4,6.9h.8V7.9c-7.1-2.2-15.7-4.1-25.8-5.6-10.1-1.5-19.4-2.2-28-2.2-16.8,0-30.9,2.5-42.1,7.4-11.2,5-19.5,11.9-24.8,20.9-5.3,9-8,19.5-8,31.7v5h-18.8v46.9h18.8v93.4h46.8v-93.4h43.8v93.4h46.8v-116.8h-23.4v23.4Z"/>
    </svg>
  </a>
  <nav>
    <ul class="nav-links">
      <li><a href="index.html">Work</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>
</header>

<!-- contact content -->
<div class="content" id="content">
  <div class="contact-left">
    <h1 class="contact-title">Let's make a boundless possibility</h1>
    <p class="contact-intro">For brand inquiries, collaborations, or a quiet hello — write to us. We'll get back within a few days.</p>

    <div class="contact-info-group">
      <div class="contact-info-label">Email</div>
      <div class="contact-info-value"><a href="mailto:hello@nufik.com">hello@nufik.com</a></div>
    </div>
    <div class="contact-info-group">
      <div class="contact-info-label">Based in</div>
      <div class="contact-info-value">Singapore, Korea</div>
    </div>
  </div>

  <div class="contact-center"></div>

  <div class="contact-right">
    <form class="contact-form" id="contactForm">
      <!-- Web3Forms access key -->
      <input type="hidden" name="access_key" value="fa75224f-e122-43bd-9e25-e711dfd4bea7">
      <input type="hidden" name="subject" value="New message from nufik.com">
      <input type="hidden" name="from_name" value="Nūfik Website">
      <!-- honeypot -->
      <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off">

      <div class="form-field">
        <label class="form-label" for="name">Name</label>
        <input class="form-input" type="text" id="name" name="name" required autocomplete="name">
      </div>

      <div class="form-field">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" name="email" required autocomplete="email">
      </div>

      <div class="form-field">
        <label class="form-label" for="interest">I'm interested in</label>
        <select class="form-select" id="interest" name="interest" required>
          <option value="" disabled selected>Select an option</option>
          <option value="Brand &amp; Design">Brand &amp; Design Services</option>
          <option value="Collaboration">Collaboration</option>
          <option value="Press">Press</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-field">
        <label class="form-label" for="message">Message</label>
        <textarea class="form-textarea" id="message" name="message" rows="4" required placeholder="Tell us a little about what you have in mind..."></textarea>
      </div>

      <button class="submit-btn" type="submit" id="submitBtn">Send Message</button>
      <div class="form-status" id="formStatus" aria-live="polite"></div>
    </form>
  </div>
</div>

<script>
  // Reveal on load
  window.addEventListener('load', () => {
    setTimeout(() => document.getElementById('content').classList.add('visible'), 130);
  });

  // Form submission via Web3Forms
  const form   = document.getElementById('contactForm');
  const status = document.getElementById('formStatus');
  const submit = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    status.textContent = 'Sending...';
    status.classList.remove('success', 'error');
    submit.disabled = true;

    const formData = new FormData(form);
    try {
      const res = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      if (data.success) {
        status.textContent = 'Message sent. We will be in touch soon.';
        status.classList.add('success');
        form.reset();
      } else {
        status.textContent = data.message || 'Something went wrong. Please email us directly.';
        status.classList.add('error');
      }
    } catch (err) {
      status.textContent = 'Network error. Please try again or email hello@nufik.com.';
      status.classList.add('error');
    } finally {
      submit.disabled = false;
    }
  });
</script>

</body>
</html>

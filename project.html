<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Project — Nūfik</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;500;700;800;900&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500;8..60,600;8..60,700&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/bvc3fac.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink:    #E7E7E7;
      --point:  #BBBBBB;
      --line:   #BBBBBB;
      --accent: #7B7B7B;
      --txt:    #7B7B7B;
    }

    :root {
      --capsule-fill: rgba(255,255,255,0.4);
      --capsule-line: rgba(255,255,255,1);
      --dot:          rgba(123,123,123,0.18);
      --txt-strong:   #090909;
      --radius:       10px;
    }

    /* Denim fabric texture (shared bg layer 1) */
    .denim-texture {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: url("src/denim_texture.jpg");
      background-size: 256px 256px;
      background-repeat: repeat;
      mix-blend-mode: soft-light;
      opacity: 0.9;
    }

    /* Background dot grid (shared with index) */
    .dot-grid {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1.5px);
      background-size: 32px 32px;
      background-position: 0 0;
    }

    /* Bottom blur SVG (shared bg layer 3) */
    .bg-blur {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translate(calc(-50% - 116px), 0);
      width: calc(100vw + 400px);
      min-width: 1280px;
      height: auto;
      pointer-events: none;
      opacity: 0.7;
      z-index: 3;
    }

    /* Nav capsule (shared with index) */
    .nav-capsule {
      position: fixed;
      top: calc(28px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      width: min(840px, calc(100% - 56px));
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4.2rem;
      padding: 12px 32px;
      background: var(--capsule-fill);
      border: 1px solid var(--capsule-line);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .nav-logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .nav-logo svg { width: 72px; height: auto; display: block; }
    .nav-logo svg .st0 { fill: var(--txt); }
    .nav-links {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 2.6rem;
      padding: 0; margin: 0;
    }
    .nav-links a {
      font-family: "Doto", sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--txt);
      text-decoration: none;
      transition: opacity 200ms ease, color 200ms ease;
    }
    .nav-links a.active { color: var(--txt-strong); font-weight: 900; }
    .nav-links a:not(.active):hover { color: var(--txt-strong); }

    html {
      overflow-y: scroll;
      scrollbar-gutter: stable;
    }
    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--ink);
      color: var(--txt);
    }



    /* ── project content layout ── */
    .content {
      position: relative;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 120px 28px 40px;
      gap: 40px;
      z-index: 10;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 540ms ease, transform 540ms cubic-bezier(0.22,1,0.36,1);
    }

    /* ── project body (case study blocks) ── */
    .proj-body {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: min(840px, calc(100vw - 56px));   /* matches nav-capsule width */
      margin: 0 auto;
      padding: 60px 0 160px;
      opacity: 0;
      transition: opacity 540ms ease;
    }
    .proj-body.visible { opacity: 1; }

    /* === Notion-style heading hierarchy ===
       h1 / h2 / h3 mapped from Notion's heading_1/2/3 blocks */
    .pb-h1 {
      font-family: "acumin-pro-condensed", sans-serif;
      font-weight: 700;
      font-size: clamp(28px, 3vw, 40px);
      line-height: 1.15;
      letter-spacing: 0;
      color: var(--txt);
      margin: 3.5rem 0 1.2rem;
    }
    .pb-h2 {
      font-family: "acumin-pro-condensed", sans-serif;
      font-weight: 700;
      font-size: clamp(22px, 2.2vw, 30px);
      line-height: 1.2;
      letter-spacing: 0.01em;
      color: var(--txt);
      margin: 2.8rem 0 1rem;
    }
    .pb-h3 {
      font-family: "acumin-pro-condensed", sans-serif;
      font-weight: 600;
      font-size: clamp(17px, 1.5vw, 22px);
      line-height: 1.3;
      letter-spacing: 0.02em;
      color: var(--txt);
      margin: 2rem 0 0.8rem;
    }

    /* Body — Source Serif 15px */
    .pb-paragraph {
      font-family: "Source Serif 4", "Source Serif Pro", Georgia, serif;
      font-weight: 400;
      font-style: normal;
      font-size: 15px;
      letter-spacing: 0;
      line-height: 1.7;
      color: var(--txt);
      margin: 0 0 1.2rem;
    }
    .pb-quote {
      border-left: 2px solid var(--accent);
      padding: 0.6rem 0 0.6rem 1.4rem;
      margin: 2rem 0;
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 12px;
      line-height: 1.8;
      color: var(--txt);
    }
    .pb-list {
      margin: 0 0 1.4rem 1.4rem;
      padding: 0;
    }
    .pb-list li {
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 11px;
      letter-spacing: 0.06em;
      line-height: 1.95;
      color: color-mix(in srgb, var(--txt) 75%, transparent);
      margin-bottom: 0.5rem;
    }
    .pb-divider {
      border: 0;
      border-top: 1px solid color-mix(in srgb, var(--line) 25%, transparent);
      margin: 3rem 0;
    }
    .pb-media {
      margin: 0;            /* image-to-image gap = 0 */
    }
    .pb-media img,
    .pb-media video {
      width: 100%;
      height: auto;
      display: block;
      background: var(--ink);
    }

    /* ── Image slider (Notion {{slider:a.jpg, b.jpg, ...}} token) ──
       Horizontal scroll-snap container — desktop trackpad swipe, mobile finger swipe.
       Each slide takes full container width; dots reflect active slide. */
    .pb-slider-wrap {
      margin: 0;
      width: 100%;
    }
    .pb-slider {
      display: flex;
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
      background: var(--ink);
    }
    .pb-slider::-webkit-scrollbar { display: none; }
    .pb-slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
      display: block;
    }
    .pb-slide img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
    .pb-slider-dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 14px 0 0;
    }
    .pb-slider-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(123,123,123,0.25);
      border: 0;
      padding: 0;
      cursor: pointer;
      transition: background 220ms ease, transform 220ms cubic-bezier(0.22,1,0.36,1);
    }
    .pb-slider-dot:hover { background: rgba(123,123,123,0.5); }
    .pb-slider-dot.active {
      background: rgba(9,9,9,0.7);
      transform: scale(1.4);
    }
    .pb-caption {
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--line) 55%, transparent);
      margin-top: 0.6rem;
    }
    .pb-empty {
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--line) 55%, transparent);
      text-align: center;
      padding: 60px 0;
    }
    .content.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* === Hero (cover image at top, nav-width) === */
    .proj-hero {
      width: min(840px, calc(100vw - 56px));
      aspect-ratio: 16 / 10;
      background: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: var(--radius);     /* 10px, same as nav-capsule + gallery items */
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .proj-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .proj-cover-label {
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--line) 45%, transparent);
      user-select: none;
    }

    /* === Title + meta row below hero === */
    .proj-info {
      width: min(840px, calc(100vw - 56px));
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 40px;
      align-items: start;
      padding-top: 12px;
    }
    .proj-title {
      font-family: "acumin-pro-condensed", sans-serif;
      font-weight: 700;
      font-size: clamp(24px, 2.4vw, 36px);
      line-height: 1.1;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--txt);
      margin: 0;
    }
    .proj-meta-cluster {
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }
    .proj-meta-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    /* Meta LABEL — Doto (dot), no underline */
    .proj-meta-label {
      font-family: "Doto", sans-serif;
      font-weight: 800;
      font-style: normal;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--txt) 70%, transparent);
    }
    /* Meta VALUE — Special Elite */
    .proj-meta-value {
      font-family: "Special Elite", "lumios-typewriter-used", monospace;
      font-weight: 400;
      font-style: normal;
      font-size: 12px;
      letter-spacing: 0.02em;
      color: var(--txt);
    }
    /* Description — Special Elite */
    .proj-desc {
      font-family: "Special Elite", "lumios-typewriter-used", monospace;
      font-weight: 400;
      font-style: normal;
      font-size: 12px;
      letter-spacing: 0.02em;
      line-height: 1.7;
      color: var(--txt);
    }
    /* Back button — compact pill, minimal hover */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      align-self: flex-start;
      padding: 8px 16px;
      background: #ffffff;
      border: 1px solid rgba(255,255,255,1);
      border-radius: var(--radius);
      font-family: "Doto", sans-serif;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7B7B7B;
      text-decoration: none;
      transition: background 200ms ease;
    }
    .back-btn:hover {
      background: rgba(255, 255, 255, 0.4);
    }


    /* ── mobile ── */
    @media (max-width: 900px) {
      .nav-capsule {
        top: auto;
        bottom: calc(20px + env(safe-area-inset-bottom));
        width: calc(100% - 40px);
        gap: 20px;
        padding: 10px 20px;
      }
      .nav-logo svg { width: 60px; }
      .nav-links { gap: 24px; }
      .nav-links a { font-size: 13px; letter-spacing: 0.1em; }

      .dot-grid { background-size: 24px 24px; }

      /* project layout: mobile */
      .content {
        padding: 90px 20px 40px;
        gap: 24px;
      }
      .proj-hero {
        width: 100%;
        aspect-ratio: 16 / 11;
      }
      .proj-info {
        width: 100%;
        grid-template-columns: 1fr;
        gap: 20px;
      }
      /* Mobile: Category + Year share one row; Description + Back span full width */
      .proj-meta-cluster {
        display: grid;
        grid-template-columns: 1fr 1fr;
        column-gap: 16px;
        row-gap: 1.4rem;
      }
      .proj-meta-cluster > .proj-meta-group:nth-child(3),
      .proj-meta-cluster > .back-btn {
        grid-column: 1 / -1;
      }
      /* Back button sits on its own row but keeps its intrinsic width */
      .proj-meta-cluster > .back-btn {
        justify-self: start;
      }
      .proj-body {
        padding: 32px 0 100px;
      }
      .proj-title { font-size: clamp(22px, 6vw, 30px); }
    }
  </style>
</head>
<body>

<section class="proj-body" id="projBody"></section>

<script>
  // Load project from data/projects.json by slug param
  (async function loadProject() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');
    if (!slug) {
      document.getElementById('projTitle').textContent = 'Project not found';
      return;
    }
    let project;
    try {
      const res = await fetch('data/projects.json', { cache: 'no-cache' });
      const projects = await res.json();
      project = projects.find(p => p.slug === slug);
    } catch (e) {
      console.error('Failed to load projects.json:', e);
      document.getElementById('projTitle').textContent = 'Failed to load';
      return;
    }
    if (!project) {
      document.getElementById('projTitle').textContent = 'Project not found';
      return;
    }

    // Hero (title, cover, meta)
    document.title = `${project.name} — Nūfik`;
    document.getElementById('projTitle').textContent    = project.name || '';
    document.getElementById('projCategory').textContent = project.category || '—';
    document.getElementById('projYear').textContent     = project.year || '—';
    document.getElementById('projDesc').textContent     = project.description || '';

    if (project.cover) {
      const coverImg = document.getElementById('projCover');
      coverImg.src = project.cover;
      coverImg.alt = project.name || '';
      coverImg.style.display = 'block';
      document.getElementById('projCoverLabel').style.display = 'none';
    }

    // Body blocks
    renderBody(project.content || []);
  })();

  function renderBody(blocks) {
    const root = document.getElementById('projBody');
    if (!blocks.length) {
      root.innerHTML = '<div class="pb-empty">No additional content.</div>';
      requestAnimationFrame(() => root.classList.add('visible'));
      return;
    }
    const frag = document.createDocumentFragment();
    for (const b of blocks) {
      frag.appendChild(renderBlock(b));
    }
    root.appendChild(frag);
    requestAnimationFrame(() => root.classList.add('visible'));
  }

  function renderBlock(b) {
    switch (b.type) {
      case 'heading': {
        const lvl = (b.level === 1 || b.level === 2 || b.level === 3) ? b.level : 2;
        const el = document.createElement('h' + lvl);
        el.className = 'pb-h' + lvl;       /* pb-h1 / pb-h2 / pb-h3 — styled per level */
        el.textContent = b.text || '';
        return el;
      }
      case 'paragraph': {
        const el = document.createElement('p');
        el.className = 'pb-paragraph';
        el.textContent = b.text || '';
        return el;
      }
      case 'quote': {
        const el = document.createElement('blockquote');
        el.className = 'pb-quote';
        el.textContent = b.text || '';
        return el;
      }
      case 'list': {
        const el = document.createElement(b.style === 'numbered' ? 'ol' : 'ul');
        el.className = 'pb-list';
        for (const item of (b.items || [])) {
          const li = document.createElement('li');
          li.textContent = item;
          el.appendChild(li);
        }
        return el;
      }
      case 'divider': {
        const el = document.createElement('hr');
        el.className = 'pb-divider';
        return el;
      }
      case 'image': {
        const wrap = document.createElement('figure');
        wrap.className = 'pb-media';
        const img = document.createElement('img');
        img.src = b.src;
        img.alt = b.caption || '';
        img.loading = 'lazy';
        img.decoding = 'async';
        wrap.appendChild(img);
        if (b.caption) {
          const cap = document.createElement('figcaption');
          cap.className = 'pb-caption';
          cap.textContent = b.caption;
          wrap.appendChild(cap);
        }
        return wrap;
      }
      case 'slider': {
        const wrap = document.createElement('div');
        wrap.className = 'pb-slider-wrap';
        const slider = document.createElement('div');
        slider.className = 'pb-slider';
        (b.frames || []).forEach(im => {
          const slide = document.createElement('div');
          slide.className = 'pb-slide';
          const img = document.createElement('img');
          img.src = im.src;
          img.alt = im.caption || '';
          img.loading = 'lazy';
          img.decoding = 'async';
          slide.appendChild(img);
          slider.appendChild(slide);
        });

        // Custom RAF tween — ease-in-out cubic for buttery transitions, beats
        // the browser's native smooth-scroll which varies per device. Tween
        // cancels if the user starts swiping, so finger input always wins.
        let tweenId = null;
        const cancelTween = () => {
          if (tweenId) { cancelAnimationFrame(tweenId); tweenId = null; }
        };
        const tweenTo = (targetLeft, duration = 900) => {
          cancelTween();
          const startLeft = slider.scrollLeft;
          const delta = targetLeft - startLeft;
          if (Math.abs(delta) < 1) return;
          const t0 = performance.now();
          const step = (now) => {
            const t = Math.min(1, (now - t0) / duration);
            // ease-in-out cubic
            const eased = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            slider.scrollLeft = startLeft + delta * eased;
            if (t < 1) tweenId = requestAnimationFrame(step);
            else tweenId = null;
          };
          tweenId = requestAnimationFrame(step);
        };
        slider.addEventListener('pointerdown', cancelTween, { passive: true });
        slider.addEventListener('wheel', cancelTween, { passive: true });

        const dots = document.createElement('div');
        dots.className = 'pb-slider-dots';
        (b.frames || []).forEach((_, i) => {
          const dot = document.createElement('button');
          dot.type = 'button';
          dot.className = 'pb-slider-dot' + (i === 0 ? ' active' : '');
          dot.setAttribute('aria-label', `Slide ${i + 1}`);
          dot.addEventListener('click', () => {
            const target = slider.children[i];
            if (target) tweenTo(target.offsetLeft);
          });
          dots.appendChild(dot);
        });
        let ticking = false;
        slider.addEventListener('scroll', () => {
          if (ticking) return;
          ticking = true;
          requestAnimationFrame(() => {
            const idx = Math.round(slider.scrollLeft / slider.clientWidth);
            dots.querySelectorAll('.pb-slider-dot').forEach((d, i) => {
              d.classList.toggle('active', i === idx);
            });
            ticking = false;
          });
        }, { passive: true });

        // Auto-advance — opt-in via the slider token's autoplay=true option.
        // Runs while slider is in view, pauses permanently only when the user
        // explicitly grabs control (clicks a dot). Page-scroll wheel/touch
        // events on the slider area do NOT count, otherwise auto stops before
        // it even gets a chance. Honors prefers-reduced-motion.
        const AUTO_MS = 2500;
        const total = (b.frames || []).length;
        let autoTimer = null;
        let userTouched = false;
        const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');

        const startAuto = () => {
          if (!b.autoplay || autoTimer || userTouched || total < 2 || reduced.matches) return;
          autoTimer = setInterval(() => {
            const cur = Math.round(slider.scrollLeft / slider.clientWidth);
            const next = (cur + 1) % total;
            const target = slider.children[next];
            if (target) tweenTo(target.offsetLeft);
          }, AUTO_MS);
        };
        const stopAuto = () => {
          if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
        };
        dots.addEventListener('click', () => { userTouched = true; stopAuto(); });

        const io = new IntersectionObserver(entries => {
          for (const e of entries) {
            if (e.isIntersecting) startAuto(); else stopAuto();
          }
        }, { threshold: 0.4 });
        io.observe(slider);

        wrap.appendChild(slider);
        wrap.appendChild(dots);
        return wrap;
      }
      case 'video': {
        const wrap = document.createElement('figure');
        wrap.className = 'pb-media';
        const v = document.createElement('video');
        v.src = b.src;
        v.muted = b.muted !== false;
        v.loop = b.loop !== false;
        v.playsInline = true;
        v.autoplay = true;
        v.preload = 'metadata';
        // Pause when off-screen to save battery/bandwidth
        const io = new IntersectionObserver(entries => {
          for (const e of entries) {
            if (e.isIntersecting) v.play().catch(() => {});
            else v.pause();
          }
        }, { threshold: 0.25 });
        io.observe(v);
        wrap.appendChild(v);
        if (b.caption) {
          const cap = document.createElement('figcaption');
          cap.className = 'pb-caption';
          cap.textContent = b.caption;
          wrap.appendChild(cap);
        }
        return wrap;
      }
      default: {
        const el = document.createElement('div');
        return el;
      }
    }
  }

  // Fade-in animation
  requestAnimationFrame(() => {
    setTimeout(() => document.getElementById('content').classList.add('visible'), 130);
  });
</script>
<script>
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('dragstart', e => e.preventDefault());
</script>
</body>
</html>

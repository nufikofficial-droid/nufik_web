<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Text Animation</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #fdfdfd;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .stage {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    max-width: 100vw;
    max-height: 100vh;
  }
</style>
</head>
<body>
<div class="stage">
  <canvas id="pxc" width="680" height="780"></canvas>
</div>

<script>
(function(){
  const canvas = document.getElementById('pxc');
  const ctx = canvas.getContext('2d');
  const W = 680, H = 780;
  const CX = W/2, CY = H/2;

  const phrases = [
    ["We don't", "just see"],
    ["a brand,"],
    ["we shape"],
    ["a sensation"]
  ];
  const fontSizes = [48, 52, 52, 52];

  function sampleText(lines, fontSize){
    const off = document.createElement('canvas');
    off.width = W; off.height = 260;
    const octx = off.getContext('2d');
    octx.fillStyle = '#000';
    octx.font = '300 ' + fontSize + 'px ui-monospace, "SF Mono", Menlo, Consolas, monospace';
    octx.textBaseline = 'middle';
    octx.textAlign = 'center';
    const lineHeight = fontSize * 1.15;
    const totalH = lineHeight * lines.length;
    const startY = 130 - totalH/2 + lineHeight/2;
    for(let li=0; li<lines.length; li++){
      octx.fillText(lines[li], W/2, startY + li*lineHeight);
    }
    const img = octx.getImageData(0,0,W,260).data;
    const pts = [];
    const step = 5;
    for(let y=0; y<260; y+=step){
      for(let x=0; x<W; x+=step){
        const i = (y*W + x)*4;
        if(img[i+3] > 128){
          pts.push({x: x, y: y - 130 + CY});
        }
      }
    }
    return pts;
  }

  const targets = phrases.map((p,i) => sampleText(p, fontSizes[i]));
  const maxN = Math.max(...targets.map(t=>t.length));

  const RADIUS_MAIN = 220;
  const RADIUS_INNER = 205;

  const TEXT_PARTICLES = Math.max(maxN + 50, 360);
  const INNER_LINE_PARTICLES = 90;

  const particles = [];

  for(let i=0; i<TEXT_PARTICLES; i++){
    const angle = (i / TEXT_PARTICLES) * Math.PI * 2 + Math.random()*0.15;
    particles.push({
      ring: 'main',
      x: CX + Math.cos(angle)*RADIUS_MAIN,
      y: CY + Math.sin(angle)*RADIUS_MAIN,
      baseAngle: angle,
      radius: RADIUS_MAIN,
      tx: 0, ty: 0,
      hasTarget: false,
      isDash: Math.random() < 0.35,
      size: 0.8 + Math.random()*0.5,
      phase: Math.random() * Math.PI * 2
    });
  }

  for(let i=0; i<INNER_LINE_PARTICLES; i++){
    const angle = (i / INNER_LINE_PARTICLES) * Math.PI * 2;
    particles.push({
      ring: 'inner',
      x: CX + Math.cos(angle)*RADIUS_INNER,
      y: CY + Math.sin(angle)*RADIUS_INNER,
      baseAngle: angle,
      radius: RADIUS_INNER,
      isDash: Math.random() < 0.25,
      size: 0.6 + Math.random()*0.3,
      phase: Math.random() * Math.PI * 2
    });
  }

  function assignTargets(targetPts){
    const mainIdxs = [];
    for(let i=0; i<particles.length; i++){
      if(particles[i].ring === 'main') mainIdxs.push(i);
    }
    for(let i=mainIdxs.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [mainIdxs[i],mainIdxs[j]]=[mainIdxs[j],mainIdxs[i]];
    }
    particles.forEach(p=>{ if(p.ring === 'main') p.hasTarget=false; });
    for(let k=0; k<targetPts.length && k<mainIdxs.length; k++){
      const p = particles[mainIdxs[k]];
      p.hasTarget = true;
      p.tx = targetPts[k].x;
      p.ty = targetPts[k].y;
    }
  }

  // 노이즈 텍스처
  const noiseCanvas = document.createElement('canvas');
  noiseCanvas.width = W;
  noiseCanvas.height = H;
  const nctx = noiseCanvas.getContext('2d');
  const noiseData = nctx.createImageData(W, H);
  for(let i=0; i<noiseData.data.length; i+=4){
    const v = Math.random() * 255;
    noiseData.data[i] = v;
    noiseData.data[i+1] = v;
    noiseData.data[i+2] = v;
    noiseData.data[i+3] = 28;
  }
  nctx.putImageData(noiseData, 0, 0);

  const noiseCanvas2 = document.createElement('canvas');
  noiseCanvas2.width = W;
  noiseCanvas2.height = H;
  const nctx2 = noiseCanvas2.getContext('2d');
  const noiseData2 = nctx2.createImageData(W, H);
  for(let i=0; i<noiseData2.data.length; i+=4){
    const v = Math.random() * 255;
    noiseData2.data[i] = v;
    noiseData2.data[i+1] = v;
    noiseData2.data[i+2] = v;
    noiseData2.data[i+3] = 22;
  }
  nctx2.putImageData(noiseData2, 0, 0);

  let state = 'dispersed';
  let stateTime = 0;
  let phraseIdx = 0;

  const TIMINGS = {
    dispersed: 1.6,
    forming: 1.2,
    hold: 1.8,
    dissolving: 1.0
  };

  let last = performance.now();
  let globalTime = 0;
  let noiseOffset = 0;

  function tick(now){
    const dt = Math.min((now - last)/1000, 0.05);
    last = now;
    globalTime += dt;
    stateTime += dt;
    noiseOffset += dt;

    if(state === 'dispersed' && stateTime >= TIMINGS.dispersed){
      assignTargets(targets[phraseIdx]);
      state = 'forming';
      stateTime = 0;
    } else if(state === 'forming' && stateTime >= TIMINGS.forming){
      state = 'hold';
      stateTime = 0;
    } else if(state === 'hold' && stateTime >= TIMINGS.hold){
      state = 'dissolving';
      stateTime = 0;
    } else if(state === 'dissolving' && stateTime >= TIMINGS.dissolving){
      state = 'dispersed';
      stateTime = 0;
      phraseIdx = (phraseIdx + 1) % phrases.length;
    }

    const grad = ctx.createRadialGradient(CX, CY, 20, CX, CY, 460);
    grad.addColorStop(0, '#dcdcdc');
    grad.addColorStop(0.4, '#e8e8e8');
    grad.addColorStop(0.75, '#f4f4f4');
    grad.addColorStop(1, '#fdfdfd');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    ctx.globalCompositeOperation = 'overlay';
    ctx.drawImage(noiseCanvas, 0, 0);
    const shift = Math.floor(noiseOffset * 60) % 4;
    ctx.drawImage(noiseCanvas2, shift, -shift);
    ctx.globalCompositeOperation = 'source-over';

    function easeInOut(t){ return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }

    let formProg = 0;
    if(state === 'forming') formProg = easeInOut(Math.min(stateTime/TIMINGS.forming, 1));
    else if(state === 'hold') formProg = 1;
    else if(state === 'dissolving') formProg = 1 - easeInOut(Math.min(stateTime/TIMINGS.dissolving, 1));
    else formProg = 0;

    ctx.fillStyle = '#7B7B7B';
    for(let i=0; i<particles.length; i++){
      const p = particles[i];
      const t = globalTime;

      const rotSpeed = p.ring === 'main' ? 0.18 : -0.24;
      const ang = p.baseAngle + t*rotSpeed;
      const radWave = Math.sin(t*0.8 + p.phase) * 2;
      const r = p.radius + radWave;
      const orbX = CX + Math.cos(ang)*r;
      const orbY = CY + Math.sin(ang)*r;

      let px, py;
      if(p.ring === 'main' && p.hasTarget && formProg > 0){
        const textJitterX = Math.sin(t*4 + p.phase) * (1 - formProg) * 3;
        const textJitterY = Math.cos(t*4.5 + p.phase) * (1 - formProg) * 3;
        const targetX = p.tx + textJitterX;
        const targetY = p.ty + textJitterY;
        px = orbX + (targetX - orbX) * formProg;
        py = orbY + (targetY - orbY) * formProg;
      } else {
        px = orbX;
        py = orbY;
      }

      const s = p.size;
      if(p.isDash){
        ctx.fillRect(px - 4*s, py - 1*s, 8*s, 2*s);
      } else {
        ctx.beginPath();
        ctx.arc(px, py, 1.4*s, 0, Math.PI*2);
        ctx.fill();
      }
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nūfik — Branding, defined by sensibility</title>

  <!-- Fonts: Doto (Google) for UI, Special Elite for meta, Typekit for Acumin -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;500;700;900&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/bvc3fac.css">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:           #E7E7E7;
      --txt:          #7B7B7B;
      --txt-strong:   #090909;
      --accent:       #7B7B7B;
      --capsule-fill: rgba(255,255,255,0.4);
      --capsule-line: rgba(255,255,255,1);
      --dot:          rgba(123,123,123,0.18);

      /* Cover sizing tokens — Figma: main 347px, blur 218px (≈63%) */
      --cover-center: 460px;
      --cover-blur:   290px;

      /* Figma radius — applies to covers and nav capsule alike */
      --radius: 10px;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--txt);
      overflow: hidden;
      font-family: "Doto", "lumios-typewriter-used", system-ui, sans-serif;
    }

    /* ── Denim fabric texture (shared bg layer 1) ── */
    .denim-texture {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: url("src/denim_texture.jpg");
      background-size: 256px 256px;
      background-repeat: repeat;
      mix-blend-mode: soft-light;
      opacity: 0.9;
    }

    /* ── Grid dot background (shared bg layer 2) ── */
    .dot-grid {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1.5px);
      background-size: 32px 32px;
      background-position: 0 0;
      transform: scale(1);
      filter: blur(0px);
      transition: transform 520ms cubic-bezier(0.22,1,0.36,1),
                  filter 520ms cubic-bezier(0.22,1,0.36,1);
      will-change: transform, filter;
    }

    /* ── Bottom blur SVG (shared bg layer 3) ── */
    .bg-blur {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translate(calc(-50% - 116px), 0);
      width: calc(100vw + 400px);
      min-width: 1280px;
      height: auto;
      pointer-events: none;
      opacity: 0.7;
      z-index: 3;
    }
    .dot-grid.is-scrolling {
      transform: scale(1.18);
      filter: blur(2px);
    }

    /* ── Gallery viewport: full-screen scroller, only images move ──
       Block layout (no flex) so the track grows to its intrinsic height
       and overflow-y: scroll exposes every item. */
    #gallery {
      position: fixed;
      inset: 0;
      z-index: 10;
      overflow-y: scroll;
      overflow-x: hidden;
      scroll-behavior: smooth;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    #gallery::-webkit-scrollbar { display: none; }

    #gallery-track {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 22vh 0 50vh;
      box-sizing: content-box;
    }

    /* Figma: 2-stage only — center (sharp) vs non-center (blur 4px, opacity 0.2) */
    .g-item {
      position: relative;
      flex-shrink: 0;
      cursor: pointer;
      width: var(--cover-blur);
      aspect-ratio: 1 / 1;
      border-radius: var(--radius);
      overflow: hidden;
      transition:
        width 520ms cubic-bezier(0.22,1,0.36,1),
        opacity 360ms ease,
        filter 360ms ease,
        transform 520ms cubic-bezier(0.22,1,0.36,1);
      opacity: 0.2;
      filter: blur(4px);
      margin: 14px 0;
      border: 1px solid rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.4);
    }
    .g-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .g-item.center {
      width: var(--cover-center);
      opacity: 1;
      filter: none;
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: var(--radius);
      z-index: 5;
    }
    .g-item.center:hover { transform: translateY(-4px); }

    /* ── Fixed project meta (right of center cover) ── */
    .slide-meta {
      position: fixed;
      left: calc(50% + 260px);
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      max-width: 320px;
      z-index: 50;
      pointer-events: none;
    }
    .slide-title {
      font-family: "acumin-pro-condensed", "Doto", sans-serif;
      font-weight: 600;
      font-size: 34.17px;
      letter-spacing: 0;
      color: var(--txt);
      line-height: 1.18;
      text-transform: uppercase;
    }
    .slide-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 1.6rem;
      align-items: center;
      font-family: "Special Elite", "lumios-typewriter-used", monospace;
      font-weight: 400;
      font-size: 15px;
      letter-spacing: 0.02em;
      color: var(--txt);
      line-height: 1.2;
    }
    .slide-tag-bracket { opacity: 0.95; }

    /* Meta cross-fade transition */
    .slide-meta.fade-out { opacity: 0; transition: opacity 220ms ease; }
    .slide-meta.fade-in  { opacity: 1; transition: opacity 320ms ease; }

    /* Meta blur on scroll — mirrors the dot-grid pulse */
    .slide-meta {
      filter: blur(0px);
      transition: opacity 320ms ease, filter 520ms cubic-bezier(0.22,1,0.36,1);
      will-change: filter;
    }
    .slide-meta.is-scrolling { filter: blur(2px); }

    /* ── Nav capsule (top center on desktop) ── */
    .nav-capsule {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: min(840px, calc(100% - 56px));
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4.2rem;
      padding: 12px 32px;
      background: var(--capsule-fill);
      border: 1px solid var(--capsule-line);
      border-radius: 10px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .nav-logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .nav-logo svg {
      width: 72px;
      height: auto;
      display: block;
    }
    .nav-logo svg .st0 { fill: var(--txt); }
    .nav-links {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 2.6rem;
    }
    .nav-links a {
      font-family: "Doto", sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--txt);
      text-decoration: none;
      transition: opacity 200ms ease;
    }
    .nav-links a.active { color: var(--txt-strong); opacity: 1; font-weight: 900; }
    .nav-links a:not(.active) { opacity: 1; font-weight: 800; color: var(--txt); }
    .nav-links a:not(.active):hover { color: var(--txt-strong); }

    /* ── Mobile / tablet ── */
    @media (max-width: 900px) {
      :root {
        /* Figma mobile: cover content area = viewport - 40px (20px padding both sides) */
        --cover-center: calc(100vw - 40px);
        --cover-blur:   calc((100vw - 40px) * 0.66);
      }

      /* Meta moves to top-left, above the image stack (Figma 232:987) */
      .slide-meta {
        position: fixed;
        left: 20px;
        top: 80px;
        bottom: auto;
        transform: none;
        width: calc(100% - 40px);
        max-width: none;
        align-items: stretch;
        text-align: left;
        gap: 14px;
      }
      .slide-title { font-size: 34.17px; line-height: 1; }
      .slide-tags  {
        font-size: 13px;
        gap: 8px 12px;
        justify-content: space-between;
        flex-wrap: wrap;
        width: 100%;
      }
      .slide-tag-bracket { text-align: right; flex: 1 1 auto; }

      /* Nav bar at bottom on mobile (Figma 232:946) */
      .nav-capsule {
        top: auto;
        bottom: 20px;
        width: calc(100% - 40px);
        gap: 20px;
        padding: 10px 20px;
        border-radius: var(--radius);
        justify-content: center;
      }
      .nav-logo svg { width: 60px; }
      .nav-links { gap: 24px; }
      .nav-links a { font-size: 13px; letter-spacing: 0.1em; }

      .dot-grid { background-size: 24px 24px; }

      /* Tighten vertical breathing room around each cover on mobile */
      .g-item { margin: 10px 0; }

      /* Mobile keeps the original centered-on-load top padding */
      #gallery-track { padding: 50vh 0; }
    }

    @media (max-width: 480px) {
      .slide-title { font-size: 30px; }
    }
  </style>
</head>
<body>

<!-- background dot grid -->
<div class="denim-texture" aria-hidden="true"></div>
<div class="dot-grid" aria-hidden="true"></div>
<img class="bg-blur" src="src/bg_blur.svg" alt="" aria-hidden="true">

<!-- nav capsule -->
<header class="nav-capsule" role="banner">
  <a href="index.html" class="nav-logo" aria-label="Nufik home">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 751.5 208.1">
      <polygon class="st0" points="157.1 118.1 55.5 9 0 9 0 205.3 51 205.3 51 83 56.4 83 170.2 205.3 208.1 205.3 208.1 9 157.1 9 157.1 118.1"/>
      <path class="st0" d="M333.9,129c0,7.3-1.4,13.7-4.1,19.1-2.7,5.4-6.4,9.6-11.1,12.5-4.7,2.9-9.9,4.3-15.7,4.3s-14.2-2.5-18.5-7.4c-4.3-5-6.5-12.2-6.5-21.7v-70.7h-46.6v80.8c0,19.3,4.9,34.5,14.7,45.6,9.8,11.1,23,16.7,39.7,16.7s20.5-2.5,28.9-7.4c8-4.7,14.4-11.5,19.1-20.3v24.9s46.6,0,46.6,0V65.1h-46.6v63.9Z"/>
      <rect class="st0" x="257.1" y="9" width="99" height="32.5"/>
      <polygon class="st0" points="751.5 205.3 682.8 132.5 745.6 65.1 688.1 65.1 624.5 125.6 624.5 9 577.7 9 577.7 205.3 624.5 205.3 624.5 141.6 691.8 205.3 751.5 205.3"/>
      <path class="st0" d="M530.8,111.9h-23.4v-23.4h23.4v-23.4h-67.2v-4.8c0-6.9,2.2-12.3,6.6-16.1,4.4-3.8,11.8-5.8,22.3-5.8s16.8.8,25.8,2.4c9,1.6,17.8,3.9,26.4,6.9h.8V7.9c-7.1-2.2-15.7-4.1-25.8-5.6-10.1-1.5-19.4-2.2-28-2.2-16.8,0-30.9,2.5-42.1,7.4-11.2,5-19.5,11.9-24.8,20.9-5.3,9-8,19.5-8,31.7v5h-18.8v46.9h18.8v93.4h46.8v-93.4h43.8v93.4h46.8v-116.8h-23.4v23.4Z"/>
    </svg>
  </a>
  <nav>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Work</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<!-- fixed meta block, contents swap as center image changes -->
<aside class="slide-meta fade-in" id="slide-meta" aria-live="polite">
  <h2 class="slide-title" id="meta-title"></h2>
  <div class="slide-tags">
    <span id="meta-category"></span>
    <span class="slide-tag-bracket" id="meta-tags"></span>
  </div>
</aside>

<!-- gallery: only images scroll; meta + nav stay fixed -->
<main id="gallery" aria-label="Selected works">
  <div id="gallery-track"></div>
</main>

<script>
  const gallery = document.getElementById('gallery');
  const track   = document.getElementById('gallery-track');
  const metaEl  = document.getElementById('slide-meta');
  const titleEl = document.getElementById('meta-title');
  const catEl   = document.getElementById('meta-category');
  const tagsEl  = document.getElementById('meta-tags');

  let currentCenterIdx = -1;
  let ordered = [];

  fetch('data/projects.json')
    .then(r => r.json())
    .then(projects => {
      ordered = [...projects].sort((a, b) => (a.order ?? 999) - (b.order ?? 999));

      ordered.forEach((p, i) => {
        const item = document.createElement('a');
        item.className = 'g-item';
        item.href = `project.html?slug=${encodeURIComponent(p.slug)}`;
        item.dataset.index = i;
        item.dataset.slug = p.slug;
        item.innerHTML = `<img src="${p.cover}" alt="${p.name}" loading="eager">`;
        // Prevent navigating on non-center items: clicking just scrolls to center
        item.addEventListener('click', (e) => {
          if (!item.classList.contains('center')) {
            e.preventDefault();
            scrollItemToCenter(item);
          }
        });
        track.appendChild(item);
      });

      requestAnimationFrame(initCenter);
    })
    .catch(err => console.error('Failed to load projects.json', err));

  function scrollItemToCenter(item) {
    const galleryRect = gallery.getBoundingClientRect();
    const itemRect    = item.getBoundingClientRect();
    const itemCenterY = itemRect.top + itemRect.height / 2;
    const galCenterY  = galleryRect.top + galleryRect.height / 2;
    gallery.scrollBy({ top: itemCenterY - galCenterY, behavior: 'smooth' });
  }

  function updateMeta(idx) {
    if (idx === currentCenterIdx) return;
    currentCenterIdx = idx;
    const p = ordered[idx];
    if (!p) return;
    const tagText = (p.tags && p.tags.length)
      ? p.tags.join(', ')
      : 'brand identity package';

    metaEl.classList.remove('fade-in');
    metaEl.classList.add('fade-out');

    setTimeout(() => {
      titleEl.textContent = p.name.toUpperCase();
      catEl.textContent   = p.category || '';
      tagsEl.textContent  = `[ ${tagText} ]`;
      metaEl.classList.remove('fade-out');
      metaEl.classList.add('fade-in');
    }, 180);
  }

  function updateCenter() {
    const galleryRect = gallery.getBoundingClientRect();
    const galCenterY  = galleryRect.top + galleryRect.height / 2;
    const items = track.querySelectorAll('.g-item');
    let closestEl = null;
    let closestDist = Infinity;

    items.forEach(el => {
      const r = el.getBoundingClientRect();
      const elCY = r.top + r.height / 2;
      const dist = Math.abs(elCY - galCenterY);
      if (dist < closestDist) {
        closestDist = dist;
        closestEl = el;
      }
    });

    const itemsArr = Array.from(items);
    const centerIdx = itemsArr.indexOf(closestEl);

    itemsArr.forEach((el, i) => {
      el.classList.toggle('center', i === centerIdx);
    });

    if (centerIdx >= 0) updateMeta(centerIdx);
  }

  function initCenter() {
    const items = track.querySelectorAll('.g-item');
    if (!items.length) return;
    const midEl = items[0];
    const galleryRect = gallery.getBoundingClientRect();
    const itemRect    = midEl.getBoundingClientRect();
    gallery.scrollTop = gallery.scrollTop + (itemRect.top + itemRect.height / 2) - (galleryRect.top + galleryRect.height / 2);
    updateCenter();
  }

  // Throttle via rAF; pulse the dot grid + meta text while scrolling, release on idle
  const dotGrid = document.querySelector('.dot-grid');
  const scrollPulseTargets = [dotGrid, metaEl].filter(Boolean);
  let ticking = false;
  let idleTimer = null;
  gallery.addEventListener('scroll', () => {
    scrollPulseTargets.forEach(el => {
      if (!el.classList.contains('is-scrolling')) el.classList.add('is-scrolling');
    });
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      scrollPulseTargets.forEach(el => el.classList.remove('is-scrolling'));
    }, 140);

    if (!ticking) {
      requestAnimationFrame(() => {
        updateCenter();
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });

  window.addEventListener('resize', () => requestAnimationFrame(updateCenter));
</script>

</body>
</html>

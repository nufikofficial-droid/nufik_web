<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Project — Nūfik</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;500;700;800;900&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500;8..60,600;8..60,700&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/bvc3fac.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink:    #E7E7E7;
      --point:  #BBBBBB;
      --line:   #BBBBBB;
      --accent: #7B7B7B;
      --txt:    #7B7B7B;
    }

    :root {
      --capsule-fill: rgba(255,255,255,0.4);
      --capsule-line: rgba(255,255,255,1);
      --dot:          rgba(123,123,123,0.18);
      --txt-strong:   #090909;
      --radius:       10px;
      --media-radius: 5px;     /* radius for images / sliders / mockup frames */
      --media-max:    840px;   /* hard cap on full-bleed media — matches .nav-capsule max width */
    }

    /* Denim fabric texture — softer on the detail page */
    .denim-texture {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: url("src/denim_texture.jpg");
      background-size: 256px 256px;
      background-repeat: repeat;
      mix-blend-mode: soft-light;
      opacity: 0.3;
    }

    /* Background dot grid (shared with index) */
    .dot-grid {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1.5px);
      background-size: 32px 32px;
      background-position: 0 0;
    }

    /* Bottom blur SVG — detail page uses color-burn for a subtler print feel */
    .bg-blur {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translate(calc(-50% - 116px), 0);
      width: calc(100vw + 400px);
      min-width: 1280px;
      height: auto;
      pointer-events: none;
      opacity: 0.3;
      mix-blend-mode: color-burn;
      z-index: 3;
    }

    /* Nav capsule (shared with index) */
    .nav-capsule {
      position: fixed;
      top: calc(28px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      width: min(840px, calc(100% - 56px));
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4.2rem;
      padding: 12px 32px;
      background: var(--capsule-fill);
      border: 1px solid var(--capsule-line);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .nav-logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .nav-logo svg { width: 72px; height: auto; display: block; }
    .nav-logo svg .st0 { fill: var(--txt); }
    .nav-links {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 2.6rem;
      padding: 0; margin: 0;
    }
    .nav-links a {
      font-family: "Doto", sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--txt);
      text-decoration: none;
      transition: opacity 200ms ease, color 200ms ease;
    }
    .nav-links a.active { color: var(--txt-strong); font-weight: 900; }
    .nav-links a:not(.active):hover { color: var(--txt-strong); }

    html {
      overflow-y: scroll;
      scrollbar-gutter: stable;
    }
    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--ink);
      color: var(--txt);
      overflow-x: hidden;
    }



    /* ── project content layout ── */
    .content {
      position: relative;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
      gap: 80px;
      z-index: 10;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 540ms ease, transform 540ms cubic-bezier(0.22,1,0.36,1);
    }

    /* ── project body (case study blocks) ── */
    .proj-body {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: min(840px, calc(100vw - 56px));   /* matches nav-capsule width */
      margin: 0 auto;
      padding: 60px 0 160px;
      opacity: 0;
      transition: opacity 540ms ease;
    }
    .proj-body.visible { opacity: 1; }

    /* === Notion-style heading hierarchy ===
       h1 / h2 / h3 mapped from Notion's heading_1/2/3 blocks */
    .pb-h1 {
      font-family: "acumin-pro-condensed", sans-serif;
      font-weight: 700;
      font-size: clamp(28px, 3vw, 40px);
      line-height: 1.15;
      letter-spacing: 0;
      color: var(--txt);
      margin: 3.5rem 0 1.2rem;
    }
    .pb-h2 {
      font-family: "acumin-pro-condensed", sans-serif;
      font-weight: 700;
      font-size: clamp(22px, 2.2vw, 30px);
      line-height: 1.2;
      letter-spacing: 0.01em;
      color: var(--txt);
      margin: 2.8rem 0 1rem;
    }
    .pb-h3 {
      font-family: "acumin-pro-condensed", sans-serif;
      font-weight: 600;
      font-size: clamp(17px, 1.5vw, 22px);
      line-height: 1.3;
      letter-spacing: 0.02em;
      color: var(--txt);
      margin: 2rem 0 0.8rem;
    }

    /* Body — Source Serif 18px */
    .pb-paragraph {
      font-family: "Source Serif 4", "Source Serif Pro", Georgia, serif;
      font-weight: 400;
      font-style: normal;
      font-size: 18px;
      letter-spacing: 0;
      line-height: 2.0;
      color: var(--txt);
      margin: 0 0 1.2rem;
    }
    .pb-quote {
      border-left: 2px solid var(--accent);
      padding: 0.6rem 0 0.6rem 1.4rem;
      margin: 2rem 0;
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 12px;
      line-height: 1.8;
      color: var(--txt);
    }
    .pb-list {
      margin: 0 0 1.4rem 1.4rem;
      padding: 0;
    }
    .pb-list li {
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 11px;
      letter-spacing: 0.06em;
      line-height: 1.95;
      color: color-mix(in srgb, var(--txt) 75%, transparent);
      margin-bottom: 0.5rem;
    }
    .pb-divider {
      border: 0;
      border-top: 1px solid color-mix(in srgb, var(--line) 25%, transparent);
      margin: 3rem 0;
    }
    /* Single image / video — full-bleed by default (breaks out of .proj-body
       column to 100vw with 0 horizontal margin, capped at --media-max on
       wide screens). Add the .inline variant (rendered when the token is
       {{img-inline:...}}) to keep it boxed inside the body column. */
    .pb-media {
      margin: 0;
      width: min(100vw, var(--media-max));
      max-width: none;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
    }
    .pb-media.inline {
      width: 100%;
      position: static;
      left: auto;
      transform: none;
      margin: 0;
    }
    .pb-media img,
    .pb-media video {
      width: 100%;
      height: auto;
      display: block;
      background: var(--ink);
      border-radius: var(--media-radius);
    }

    /* ── Image slider (Notion {{slider:a.jpg, b.jpg, ...}} token) ──
       Horizontal scroll-snap container — desktop trackpad swipe, mobile finger swipe.
       Each slide takes full container width; dots reflect active slide. */
    .pb-slider-wrap {
      margin: 0;
      width: min(100vw, var(--media-max));
      max-width: none;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
    }
    .pb-slider {
      display: flex;
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
      background: var(--ink);
    }
    .pb-slider::-webkit-scrollbar { display: none; }
    .pb-slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
      display: block;
    }
    .pb-slide img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: var(--media-radius);
      user-select: none;
      -webkit-user-drag: none;
    }
    .pb-slider-dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 14px 0 0;
    }
    .pb-slider-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(123,123,123,0.25);
      border: 0;
      padding: 0;
      cursor: pointer;
      transition: background 220ms ease, transform 220ms cubic-bezier(0.22,1,0.36,1);
    }
    .pb-slider-dot:hover { background: rgba(123,123,123,0.5); }
    .pb-slider-dot.active {
      background: rgba(9,9,9,0.7);
      transform: scale(1.4);
    }

    /* ── Stepped marquee variant (slider style=marquee) ──
       Active frame sits centered with the prev/next peeking on both sides.
       JS drives discrete steps every 2.2s; CSS transition gives the "tock". */
    .pb-marquee-wrap {
      margin: 3rem 0;
      width: min(100vw, var(--media-max));
      max-width: none;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
    }
    .pb-marquee-stage {
      width: 100%;
      overflow: hidden;
    }
    .pb-marquee-track {
      display: flex;
      align-items: center;          /* mixed-height slides center-align vertically */
      width: max-content;
      gap: 16px;
      padding: 0;
      transition: transform 380ms cubic-bezier(0.65, 0.05, 0.36, 1);
      will-change: transform;
    }
    .pb-marquee-slide {
      flex: 0 0 auto;
      /* 83.3% of stage width → leaves ~10% peek on each side */
      width: min(83.3vw, calc(var(--media-max) * 0.833));
      border-radius: var(--media-radius);
      overflow: hidden;
      background: var(--ink);
    }
    .pb-marquee-slide img {
      width: 100%;
      height: auto;                 /* preserve each image's natural aspect ratio */
      display: block;
    }
    .pb-marquee-pills {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 18px;
    }
    .pb-marquee-pill {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid color-mix(in srgb, var(--txt-strong) 50%, transparent);
      transition:
        width 320ms cubic-bezier(0.22,1,0.36,1),
        border-radius 320ms ease,
        background 320ms ease,
        border-color 320ms ease;
    }
    .pb-marquee-pill.active {
      width: 18px;
      border-radius: 2px;
      background: color-mix(in srgb, var(--txt-strong) 50%, transparent);
      border-color: color-mix(in srgb, var(--txt-strong) 50%, transparent);
    }

    /* ── Polaroid stack slider (slider style=polaroid) ──
       Cards stacked at center, each with its own rotation, only the active
       one is visible. Crossfades on auto-cycle. No indicators, no peek. */
    .pb-polaroid-wrap {
      margin: 3rem 0;
      width: min(100vw, var(--media-max));
      max-width: none;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      justify-content: center;
    }
    .pb-polaroid-stage {
      display: grid;
      width: 100%;
      padding: 40px 30px;          /* breathing room for rotated corners */
      box-sizing: border-box;
    }
    .pb-polaroid-slide {
      grid-column: 1;
      grid-row: 1;
      opacity: 0;
      transform-origin: center;
      transition: opacity 700ms cubic-bezier(0.22,1,0.36,1);
      will-change: opacity, transform;
    }
    .pb-polaroid-slide.active {
      opacity: 1;
    }
    .pb-polaroid-slide img {
      width: 100%;
      height: auto;
      display: block;
    }

    .pb-caption {
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--line) 55%, transparent);
      margin-top: 0.6rem;
    }
    .pb-empty {
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--line) 55%, transparent);
      text-align: center;
      padding: 60px 0;
    }

    /* ── Editorial blocks (from the 333 layout) ──
       Each is a Notion-token-driven content block: {{letter}}, {{polaroids}},
       {{pair}}, {{stack}}. They opt out of .proj-body's column width by
       breaking out via negative margins where appropriate. */

    /* {{letter:Nū}} — single oversized display letterform.
       Matches the nav font (Doto 800) at display scale, in the per-project
       text color at 30% alpha so it reads as a quiet typographic break. */
    .pb-letter {
      font-family: "Doto", sans-serif;
      font-weight: 800;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: 0;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--txt-strong) 30%, transparent);
      text-align: center;
      margin: 4rem 0 2rem;
    }

    /* {{polaroids:a.jpg@-6,b.jpg,c.jpg@3}} — vertical column of rotated cards.
       Desktop: alternating left/right alignment (zig-zag). Mobile: centered,
       larger. Each card slides in from its side + rotates to final angle on
       first viewport entry; .is-visible is added by IntersectionObserver in
       the renderer. */
    .pb-polaroids {
      display: flex;
      flex-direction: column;
      gap: 80px;
      margin: 4rem 0;
      padding: 40px 30px;
      width: min(100vw, var(--media-max));
      max-width: none;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
      box-sizing: border-box;
    }
    /* The card is a layout-only flex row. The rotation/slide-in animation
       lives on .pb-polaroid-photo so .pb-polaroid-caption can stay upright
       on the opposite side. */
    .pb-polaroid {
      flex: 0 0 auto;
      width: clamp(280px, 55vw, 600px);
      align-self: center;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 28px;
    }
    .pb-polaroid-photo {
      flex: 0 0 auto;
      width: 100%;
      border-radius: var(--media-radius);
      overflow: hidden;
      transform-origin: center;
      opacity: 0;
      transform: translateX(var(--slide-from, -40px)) rotate(calc(var(--rot, 0deg) - 3deg));
      transition:
        transform 1100ms cubic-bezier(0.22, 1, 0.36, 1),
        opacity 800ms ease;
      transition-delay: var(--enter-delay, 0ms);
      will-change: transform, opacity;
    }
    .pb-polaroid.is-visible .pb-polaroid-photo {
      opacity: 1;
      transform: translateX(0) rotate(var(--rot, 0deg));
    }
    .pb-polaroid-photo img {
      width: 100%;
      height: auto;
      display: block;
    }
    .pb-polaroid.is-visible:hover .pb-polaroid-photo {
      transform: translateX(0) rotate(var(--rot, 0deg)) translateY(-6px);
      transition-duration: 280ms;
    }

    /* Caption styling — typewriter tone matches the rest of the body */
    .pb-polaroid-caption {
      font-family: "Special Elite", lumios-typewriter-used, monospace;
      font-size: 14px;
      line-height: 1.6;
      color: var(--txt);
      max-width: 220px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 700ms ease 200ms, transform 700ms ease 200ms;
    }
    .pb-polaroid.is-visible .pb-polaroid-caption {
      opacity: 1;
      transform: none;
    }

    /* Desktop layout — caption sits in the column's opposite empty space.
       Odd cards keep the photo on the left, even cards on the right (zig-zag).
       Captioned cards span the full column width so the caption can occupy the
       whole empty area beside the photo and center itself within it. */
    @media (min-width: 701px) {
      .pb-polaroid {
        width: clamp(280px, 55vw, 600px);
      }
      .pb-polaroid-photo {
        width: 100%;
        max-width: 100%;
      }
      /* Odd: photo on the left, caption fills the empty space on its right */
      .pb-polaroid:nth-child(odd) {
        align-self: flex-start;
        --slide-from: -40px;
        flex-direction: row;
      }
      /* Even: photo on the right, caption fills the empty space on its left */
      .pb-polaroid:nth-child(even) {
        align-self: flex-end;
        --slide-from: 40px;
        flex-direction: row-reverse;
      }
      /* Captioned cards stretch across the full column; the photo keeps a fixed
         width and the caption takes the remaining space, centering its text
         within that whole empty area. */
      .pb-polaroid.has-caption {
        width: 100%;
        align-self: stretch;
      }
      .pb-polaroid.has-caption .pb-polaroid-photo {
        flex: 0 0 clamp(280px, 38vw, 420px);
        width: clamp(280px, 38vw, 420px);
      }
      .pb-polaroid.has-caption .pb-polaroid-caption {
        flex: 1 1 auto;
        max-width: none;
        text-align: center;
      }
    }

    @media (max-width: 700px) {
      .pb-polaroids { gap: 56px; padding: 30px 16px; }
      .pb-polaroid {
        width: 86vw;
        align-self: center;
        --slide-from: -24px;
        /* Stack vertically: photo on top, caption below */
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .pb-polaroid-photo { width: 100%; }
      .pb-polaroid-caption {
        text-align: center;
        max-width: 90%;
        font-size: 13px;
      }
    }

    /* {{pair:a.jpg|b.jpg}} — two large mockups side by side with right overflow */
    .pb-pair {
      display: flex;
      align-items: flex-start;        /* uneven heights top-align */
      gap: 29px;
      margin: 3rem 0;
      width: min(calc(100vw - 56px), var(--media-max));
      max-width: none;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
      overflow: visible;
    }
    .pb-pair-frame {
      flex: 1 1 0;
      min-width: 0;
      border-radius: var(--media-radius);
      overflow: hidden;
      background: var(--ink);
    }
    .pb-pair-frame img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* {{stack:a.jpg|b.jpg|…|indent=1,2}} — full-bleed vertical stack.
       Frames at the indexed positions sit inset 40px each side. */
    .pb-stack {
      display: flex;
      flex-direction: column;
      gap: 40px;
      margin: 3rem 0;
      width: min(calc(100vw - 56px), var(--media-max));
      max-width: none;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
    }
    .pb-stack-frame {
      width: 100%;
      border-radius: var(--media-radius);
      overflow: hidden;
      background: var(--ink);
    }
    .pb-stack-frame.indented { width: calc(100% - 80px); margin: 0 40px; }
    .pb-stack-frame img {
      width: 100%;
      height: auto;
      display: block;
    }
    .content.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* === Hero (cover image at top, full-bleed) ===
       Full-viewport width, no border, no radius. Bottom fades to transparent
       via a linear-gradient mask so the page tone (--ink) shows through and
       the eye glides into the title block below. */
    .proj-hero {
      width: 100vw;
      background: transparent;
      border: 0;
      border-radius: 0;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to bottom, #000 75%, transparent 100%);
              mask-image: linear-gradient(to bottom, #000 75%, transparent 100%);
    }
    .proj-cover {
      width: 100%;
      height: auto;
      display: block;
    }
    .proj-cover-label {
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--line) 45%, transparent);
      user-select: none;
    }

    /* === Title + meta row below hero === */
    .proj-info {
      width: min(840px, calc(100vw - 56px));
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 40px;
      align-items: start;
      padding-top: 12px;
    }
    .proj-title {
      font-family: "acumin-pro-condensed", sans-serif;
      font-weight: 700;
      font-size: clamp(72px, 12vw, 150px);
      line-height: 0.9;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: var(--txt-strong);
      margin: 0;
    }
    .proj-meta-cluster {
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }
    .proj-meta-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    /* Meta LABEL — Doto (dot), no underline */
    .proj-meta-label {
      font-family: "Doto", sans-serif;
      font-weight: 800;
      font-style: normal;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--txt) 70%, transparent);
    }
    /* Meta VALUE — Special Elite */
    .proj-meta-value {
      font-family: "Special Elite", "lumios-typewriter-used", monospace;
      font-weight: 400;
      font-style: normal;
      font-size: 12px;
      letter-spacing: 0.02em;
      color: var(--txt);
    }
    /* Description — Special Elite */
    .proj-desc {
      font-family: "Special Elite", "lumios-typewriter-used", monospace;
      font-weight: 400;
      font-style: normal;
      font-size: 12px;
      letter-spacing: 0.02em;
      line-height: 1.7;
      color: var(--txt);
    }
    /* Back button — compact pill at 30% fill, text follows per-project tone */
    .back-btn {
      position: fixed;
      top: calc(28px + env(safe-area-inset-top));
      left: 28px;
      z-index: 100;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      font-family: "Doto", sans-serif;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--txt-strong);
      text-decoration: none;
      transition: background 200ms ease, border-color 200ms ease;
    }
    .back-btn:hover {
      background: rgba(255, 255, 255, 0.5);
      border-color: rgba(255, 255, 255, 0.8);
    }


    /* ── mobile ── */
    @media (max-width: 900px) {
      .nav-capsule {
        top: auto;
        bottom: calc(20px + env(safe-area-inset-bottom));
        width: calc(100% - 40px);
        gap: 20px;
        padding: 10px 20px;
      }
      .nav-logo svg { width: 60px; }
      .nav-links { gap: 24px; }
      .nav-links a { font-size: 13px; letter-spacing: 0.1em; }

      .dot-grid { background-size: 24px 24px; }

      /* project layout: mobile */
      .content {
        padding: 0 0 40px;
        gap: 48px;
      }
      .proj-hero {
        width: 100vw;
        aspect-ratio: 16 / 11;
      }
      .proj-info {
        width: calc(100% - 40px);
        grid-template-columns: 1fr;
        gap: 20px;
      }
      /* Mobile: Category + Year share one row; Description + Back span full width */
      .proj-meta-cluster {
        display: grid;
        grid-template-columns: 1fr 1fr;
        column-gap: 16px;
        row-gap: 1.4rem;
      }
      .proj-meta-cluster > .proj-meta-group:nth-child(3) {
        grid-column: 1 / -1;
      }
      /* Back button: keep top-left on mobile too, just tighter offset */
      .back-btn {
        top: calc(20px + env(safe-area-inset-top));
        left: 20px;
      }
      .proj-body {
        padding: 32px 0 100px;
      }
      .proj-title { font-size: clamp(22px, 6vw, 30px); }
    }
  </style>
</head>

<!-- project body (case study content blocks) -->
<section class="proj-body" id="projBody"></section>

<script>
  // Load project from data/projects.json by slug param
  (async function loadProject() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');
    if (!slug) {
      document.getElementById('projTitle').textContent = 'Project not found';
      return;
    }
    let project;
    try {
      const res = await fetch('data/projects.json', { cache: 'no-cache' });
      const projects = await res.json();
      project = projects.find(p => p.slug === slug);
    } catch (e) {
      console.error('Failed to load projects.json:', e);
      document.getElementById('projTitle').textContent = 'Failed to load';
      return;
    }
    if (!project) {
      document.getElementById('projTitle').textContent = 'Project not found';
      return;
    }

    // Per-project page tone — override --ink so the page bg tints to the
    // project's brand color (denim texture + soft-light blend ride on top).
    if (project.tone) {
      document.documentElement.style.setProperty('--ink', project.tone);
    }
    // Per-project text tone — overrides both --txt-strong (titles, headings)
    // and --txt (body, meta) so every piece of text on the detail page
    // inherits the project's chosen color in one shot.
    if (project.toneText) {
      document.documentElement.style.setProperty('--txt-strong', project.toneText);
      document.documentElement.style.setProperty('--txt', project.toneText);
    }

    // Hero (title, cover, meta)
    document.title = `${project.name} — Nūfik`;
    document.getElementById('projTitle').textContent    = project.name || '';
    document.getElementById('projCategory').textContent = project.category || '—';
    document.getElementById('projYear').textContent     = project.year || '—';
    document.getElementById('projDesc').textContent     = project.description || '';

    if (project.cover) {
      const coverImg = document.getElementById('projCover');
      coverImg.src = project.cover;
      coverImg.alt = project.name || '';
      coverImg.style.display = 'block';
      document.getElementById('projCoverLabel').style.display = 'none';
    }

    // Body blocks
    renderBody(project.content || []);
  })();

  function renderBody(blocks) {
    const root = document.getElementById('projBody');
    if (!blocks.length) {
      root.innerHTML = '<div class="pb-empty">No additional content.</div>';
      requestAnimationFrame(() => root.classList.add('visible'));
      return;
    }
    const frag = document.createDocumentFragment();
    for (const b of blocks) {
      frag.appendChild(renderBlock(b));
    }
    root.appendChild(frag);
    requestAnimationFrame(() => root.classList.add('visible'));
  }

  function renderBlock(b) {
    switch (b.type) {
      case 'heading': {
        const lvl = (b.level === 1 || b.level === 2 || b.level === 3) ? b.level : 2;
        const el = document.createElement('h' + lvl);
        el.className = 'pb-h' + lvl;       /* pb-h1 / pb-h2 / pb-h3 — styled per level */
        el.textContent = b.text || '';
        return el;
      }
      case 'paragraph': {
        const el = document.createElement('p');
        el.className = 'pb-paragraph';
        el.textContent = b.text || '';
        return el;
      }
      case 'quote': {
        const el = document.createElement('blockquote');
        el.className = 'pb-quote';
        el.textContent = b.text || '';
        return el;
      }
      case 'list': {
        const el = document.createElement(b.style === 'numbered' ? 'ol' : 'ul');
        el.className = 'pb-list';
        for (const item of (b.items || [])) {
          const li = document.createElement('li');
          li.textContent = item;
          el.appendChild(li);
        }
        return el;
      }
      case 'divider': {
        const el = document.createElement('hr');
        el.className = 'pb-divider';
        return el;
      }
      case 'image': {
        const wrap = document.createElement('figure');
        wrap.className = 'pb-media' + (b.inline ? ' inline' : '');
        const img = document.createElement('img');
        img.src = b.src;
        img.alt = b.caption || '';
        img.loading = 'lazy';
        img.decoding = 'async';
        wrap.appendChild(img);
        if (b.caption) {
          const cap = document.createElement('figcaption');
          cap.className = 'pb-caption';
          cap.textContent = b.caption;
          wrap.appendChild(cap);
        }
        return wrap;
      }
      case 'letter': {
        const el = document.createElement('p');
        el.className = 'pb-letter';
        el.textContent = b.text || '';
        return el;
      }
      case 'polaroids': {
        const wrap = document.createElement('div');
        wrap.className = 'pb-polaroids';
        (b.items || []).forEach((it, i) => {
          const card = document.createElement('figure');
          card.className = 'pb-polaroid';
          card.style.setProperty('--rot', `${it.rotation || 0}deg`);
          card.style.setProperty('--enter-delay', `${i * 120}ms`);
          if (it.caption) card.classList.add('has-caption');

          const photo = document.createElement('div');
          photo.className = 'pb-polaroid-photo';
          const img = document.createElement('img');
          img.src = it.src;
          img.alt = it.caption || '';
          img.loading = 'lazy';
          img.decoding = 'async';
          photo.appendChild(img);
          card.appendChild(photo);

          if (it.caption) {
            const cap = document.createElement('figcaption');
            cap.className = 'pb-polaroid-caption';
            cap.textContent = it.caption;
            card.appendChild(cap);
          }
          wrap.appendChild(card);
        });
        // Slide-in + rotate on first viewport entry; respects reduced motion.
        const cards = wrap.querySelectorAll('.pb-polaroid');
        const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');
        if (reduced.matches) {
          cards.forEach(c => c.classList.add('is-visible'));
        } else {
          const io = new IntersectionObserver((entries, observer) => {
            for (const entry of entries) {
              if (entry.isIntersecting) {
                entry.target.classList.add('is-visible');
                observer.unobserve(entry.target);
              }
            }
          }, { threshold: 0.2 });
          cards.forEach(c => io.observe(c));
        }
        return wrap;
      }
      case 'pair': {
        const wrap = document.createElement('div');
        wrap.className = 'pb-pair';
        (b.images || []).forEach(src => {
          const frame = document.createElement('div');
          frame.className = 'pb-pair-frame';
          const img = document.createElement('img');
          img.src = src;
          img.alt = '';
          img.loading = 'lazy';
          img.decoding = 'async';
          frame.appendChild(img);
          wrap.appendChild(frame);
        });
        return wrap;
      }
      case 'stack': {
        const wrap = document.createElement('div');
        wrap.className = 'pb-stack';
        const indentSet = new Set(b.indent || []);
        (b.images || []).forEach((src, i) => {
          const frame = document.createElement('div');
          frame.className = 'pb-stack-frame' + (indentSet.has(i) ? ' indented' : '');
          const img = document.createElement('img');
          img.src = src;
          img.alt = '';
          img.loading = 'lazy';
          img.decoding = 'async';
          frame.appendChild(img);
          wrap.appendChild(frame);
        });
        return wrap;
      }
      case 'slider': {
        // style=polaroid → stacked rotated cards, crossfade auto-cycle, no chrome
        if (b.style === 'polaroid') {
          const wrap = document.createElement('div');
          wrap.className = 'pb-polaroid-wrap';
          const stage = document.createElement('div');
          stage.className = 'pb-polaroid-stage';

          const frames = b.frames || [];
          const total = frames.length;
          frames.forEach((f, i) => {
            const slide = document.createElement('div');
            slide.className = 'pb-polaroid-slide' + (i === 0 ? ' active' : '');
            if (f.rotation) slide.style.transform = `rotate(${f.rotation}deg)`;
            const img = document.createElement('img');
            img.src = f.src;
            img.alt = '';
            img.loading = i === 0 ? 'eager' : 'lazy';
            img.decoding = 'async';
            slide.appendChild(img);
            stage.appendChild(slide);
          });
          wrap.appendChild(stage);

          const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');
          if (b.autoplay && total > 1 && !reduced.matches) {
            const slides = stage.querySelectorAll('.pb-polaroid-slide');
            let i = 0;
            let autoTimer = null;
            const startAuto = () => {
              if (autoTimer) return;
              autoTimer = setInterval(() => {
                slides[i].classList.remove('active');
                i = (i + 1) % total;
                slides[i].classList.add('active');
              }, 2500);
            };
            const stopAuto = () => {
              if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
            };
            const io = new IntersectionObserver(entries => {
              for (const e of entries) {
                if (e.isIntersecting) startAuto(); else stopAuto();
              }
            }, { threshold: 0.4 });
            io.observe(stage);
          }
          return wrap;
        }

        // style=marquee → stepped center-and-peek marquee (V3d behavior)
        if (b.style === 'marquee') {
          const wrap = document.createElement('div');
          wrap.className = 'pb-marquee-wrap';
          const stage = document.createElement('div');
          stage.className = 'pb-marquee-stage';
          const track = document.createElement('div');
          track.className = 'pb-marquee-track';

          const frames = b.frames || [];
          const total = frames.length;
          // 3 batches so active sits centered with real frames peeking both sides
          for (let batch = 0; batch < 3; batch++) {
            frames.forEach(f => {
              const slide = document.createElement('div');
              slide.className = 'pb-marquee-slide';
              const img = document.createElement('img');
              img.src = f.src;
              img.alt = f.caption || '';
              img.loading = 'lazy';
              img.decoding = 'async';
              slide.appendChild(img);
              track.appendChild(slide);
            });
          }
          stage.appendChild(track);
          wrap.appendChild(stage);

          const pillsBox = document.createElement('div');
          pillsBox.className = 'pb-marquee-pills';
          for (let k = 0; k < total; k++) {
            const pill = document.createElement('span');
            pill.className = 'pb-marquee-pill' + (k === 0 ? ' active' : '');
            pillsBox.appendChild(pill);
          }
          wrap.appendChild(pillsBox);

          const slides = track.querySelectorAll('.pb-marquee-slide');
          const pills = pillsBox.querySelectorAll('.pb-marquee-pill');
          const STEP_MS = 2200;
          const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');
          const slideStep = () => slides[0].offsetWidth + 16;
          let i = total;

          const centerAt = (idx, useTransition) => {
            const stageCenter = stage.offsetWidth / 2;
            const slideW = slides[0].offsetWidth;
            const activeCenter = idx * slideStep() + slideW / 2;
            track.style.transition = useTransition
              ? 'transform 380ms cubic-bezier(0.65, 0.05, 0.36, 1)'
              : 'none';
            track.style.transform = `translateX(${stageCenter - activeCenter}px)`;
          };
          const setActivePill = (idx) => {
            const u = (idx - total + total) % total;
            pills.forEach((p, k) => p.classList.toggle('active', k === u));
          };

          requestAnimationFrame(() => centerAt(i, false));

          let autoTimer = null;
          const startAuto = () => {
            if (autoTimer || total < 2 || reduced.matches) return;
            autoTimer = setInterval(() => {
              i++;
              centerAt(i, true);
              setActivePill(i);
              if (i >= total * 2) {
                setTimeout(() => {
                  i = total;
                  centerAt(i, false);
                }, 420);
              }
            }, STEP_MS);
          };
          const stopAuto = () => {
            if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
          };
          const io = new IntersectionObserver(entries => {
            for (const e of entries) {
              if (e.isIntersecting) startAuto(); else stopAuto();
            }
          }, { threshold: 0.4 });
          io.observe(stage);

          window.addEventListener('resize', () => centerAt(i, false));
          return wrap;
        }

        const wrap = document.createElement('div');
        wrap.className = 'pb-slider-wrap';
        const slider = document.createElement('div');
        slider.className = 'pb-slider';
        (b.frames || []).forEach(im => {
          const slide = document.createElement('div');
          slide.className = 'pb-slide';
          const img = document.createElement('img');
          img.src = im.src;
          img.alt = im.caption || '';
          img.loading = 'lazy';
          img.decoding = 'async';
          slide.appendChild(img);
          slider.appendChild(slide);
        });

        // Custom RAF tween — ease-in-out cubic for buttery transitions, beats
        // the browser's native smooth-scroll which varies per device. Tween
        // cancels if the user starts swiping, so finger input always wins.
        let tweenId = null;
        const cancelTween = () => {
          if (tweenId) { cancelAnimationFrame(tweenId); tweenId = null; }
        };
        const tweenTo = (targetLeft, duration = 900) => {
          cancelTween();
          const startLeft = slider.scrollLeft;
          const delta = targetLeft - startLeft;
          if (Math.abs(delta) < 1) return;
          const t0 = performance.now();
          const step = (now) => {
            const t = Math.min(1, (now - t0) / duration);
            // ease-in-out cubic
            const eased = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            slider.scrollLeft = startLeft + delta * eased;
            if (t < 1) tweenId = requestAnimationFrame(step);
            else tweenId = null;
          };
          tweenId = requestAnimationFrame(step);
        };
        slider.addEventListener('pointerdown', cancelTween, { passive: true });
        slider.addEventListener('wheel', cancelTween, { passive: true });

        const dots = document.createElement('div');
        dots.className = 'pb-slider-dots';
        (b.frames || []).forEach((_, i) => {
          const dot = document.createElement('button');
          dot.type = 'button';
          dot.className = 'pb-slider-dot' + (i === 0 ? ' active' : '');
          dot.setAttribute('aria-label', `Slide ${i + 1}`);
          dot.addEventListener('click', () => {
            const target = slider.children[i];
            if (target) tweenTo(target.offsetLeft);
          });
          dots.appendChild(dot);
        });
        let ticking = false;
        slider.addEventListener('scroll', () => {
          if (ticking) return;
          ticking = true;
          requestAnimationFrame(() => {
            const idx = Math.round(slider.scrollLeft / slider.clientWidth);
            dots.querySelectorAll('.pb-slider-dot').forEach((d, i) => {
              d.classList.toggle('active', i === idx);
            });
            ticking = false;
          });
        }, { passive: true });

        // Auto-advance — opt-in via the slider token's autoplay=true option.
        // Runs while slider is in view, pauses permanently only when the user
        // explicitly grabs control (clicks a dot). Page-scroll wheel/touch
        // events on the slider area do NOT count, otherwise auto stops before
        // it even gets a chance. Honors prefers-reduced-motion.
        const AUTO_MS = 2500;
        const total = (b.frames || []).length;
        let autoTimer = null;
        let userTouched = false;
        const reduced = window.matchMedia('(prefers-reduced-motion: reduce)');

        const startAuto = () => {
          if (!b.autoplay || autoTimer || userTouched || total < 2 || reduced.matches) return;
          autoTimer = setInterval(() => {
            const cur = Math.round(slider.scrollLeft / slider.clientWidth);
            const next = (cur + 1) % total;
            const target = slider.children[next];
            if (target) tweenTo(target.offsetLeft);
          }, AUTO_MS);
        };
        const stopAuto = () => {
          if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
        };
        dots.addEventListener('click', () => { userTouched = true; stopAuto(); });

        const io = new IntersectionObserver(entries => {
          for (const e of entries) {
            if (e.isIntersecting) startAuto(); else stopAuto();
          }
        }, { threshold: 0.4 });
        io.observe(slider);

        wrap.appendChild(slider);
        wrap.appendChild(dots);
        return wrap;
      }
      case 'video': {
        const wrap = document.createElement('figure');
        wrap.className = 'pb-media';
        const v = document.createElement('video');
        v.src = b.src;
        v.muted = b.muted !== false;
        v.loop = b.loop !== false;
        v.playsInline = true;
        v.autoplay = true;
        v.preload = 'metadata';
        // Pause when off-screen to save battery/bandwidth
        const io = new IntersectionObserver(entries => {
          for (const e of entries) {
            if (e.isIntersecting) v.play().catch(() => {});
            else v.pause();
          }
        }, { threshold: 0.25 });
        io.observe(v);
        wrap.appendChild(v);
        if (b.caption) {
          const cap = document.createElement('figcaption');
          cap.className = 'pb-caption';
          cap.textContent = b.caption;
          wrap.appendChild(cap);
        }
        return wrap;
      }
      default: {
        const el = document.createElement('div');
        return el;
      }
    }
  }

  // Fade-in animation
  requestAnimationFrame(() => {
    setTimeout(() => document.getElementById('content').classList.add('visible'), 130);
  });
</script>
<script>
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('dragstart', e => e.preventDefault());
</script>

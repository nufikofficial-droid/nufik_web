<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nūfik v2 — Changelog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;500;700;800;900&family=Special+Elite&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.typekit.net/bvc3fac.css">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #E7E7E7;
    --txt: #7B7B7B;
    --txt-strong: #090909;
    --line: #BBBBBB;
    --dot: rgba(123,123,123,0.18);
    --capsule-fill: rgba(255,255,255,0.4);
    --capsule-line: rgba(255,255,255,1);
    --radius: 10px;
  }

  html, body {
    width: 100%;
    min-height: 100%;
    background: var(--bg);
    color: var(--txt);
    font-family: "Doto", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .dot-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image: radial-gradient(circle, var(--dot) 1px, transparent 1.5px);
    background-size: 32px 32px;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 880px;
    margin: 0 auto;
    padding: 80px 40px 160px;
  }

  /* Header */
  .page-header {
    margin-bottom: 40px;
  }
  h1 {
    font-family: "acumin-pro-condensed", sans-serif;
    font-weight: 600;
    font-size: clamp(36px, 6vw, 68px);
    line-height: 1.05;
    letter-spacing: 0;
    text-transform: uppercase;
    color: var(--txt-strong);
    margin-bottom: 10px;
  }
  .subtitle {
    font-family: "Special Elite", monospace;
    font-size: 14px;
    color: var(--txt);
    letter-spacing: 0.04em;
    max-width: 580px;
    line-height: 1.6;
  }

  /* Filter chips */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 32px 0 16px;
  }
  .chip {
    font-family: "Doto", sans-serif;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,1);
    color: var(--txt-strong);
    cursor: pointer;
    transition: background 200ms ease, color 200ms ease, transform 200ms ease;
  }
  .chip:hover { transform: translateY(-1px); }
  .chip.active {
    background: var(--txt-strong);
    color: #fff;
    border-color: var(--txt-strong);
  }

  /* Timeline */
  .timeline {
    position: relative;
    margin-top: 12px;
    padding-left: 28px;
  }
  .timeline::before {
    content: "";
    position: absolute;
    left: 6px; top: 6px; bottom: 6px;
    width: 1px;
    background: rgba(123,123,123,0.35);
  }

  /* Each day entry */
  .entry {
    position: relative;
    margin-bottom: 38px;
    transition: opacity 220ms ease, transform 220ms ease;
  }
  .entry::before {
    content: "";
    position: absolute;
    left: -28px; top: 6px;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--txt-strong);
  }
  .entry.hidden { display: none; }

  .entry-date {
    font-family: "Doto", sans-serif;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--txt-strong);
    margin-bottom: 6px;
  }
  .entry-title {
    font-family: "acumin-pro-condensed", sans-serif;
    font-weight: 600;
    font-size: clamp(20px, 2.2vw, 26px);
    text-transform: uppercase;
    letter-spacing: 0;
    color: var(--txt-strong);
    line-height: 1.2;
    margin-bottom: 10px;
  }
  .entry-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .tag {
    font-family: "Doto", sans-serif;
    font-weight: 700;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    color: var(--txt-strong);
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,1);
  }
  .tag.added    { background: #d4ecd0; border-color: #a7d39e; }
  .tag.changed  { background: #d4e0f0; border-color: #9ab6d4; }
  .tag.removed  { background: #f0d4d4; border-color: #d4a7a7; }
  .tag.fixed    { background: #fff3c4; border-color: #f0d976; }
  .tag.design   { background: #e9d8f0; border-color: #c9a7d4; }
  .tag.decision { background: #f0e2d0; border-color: #d4b88a; }

  .entry-body p,
  .entry-body li {
    font-family: "Special Elite", monospace;
    font-size: 14px;
    line-height: 1.65;
    color: var(--txt);
    letter-spacing: 0.02em;
  }
  .entry-body p { margin-bottom: 10px; }
  .entry-body ul { margin: 0 0 12px 1.2em; }
  .entry-body li { margin-bottom: 4px; }
  .entry-body strong { color: var(--txt-strong); font-weight: 700; }
  .entry-body em { font-style: normal; color: var(--txt-strong); }

  /* Why / Decision panel */
  .why {
    margin-top: 12px;
    border-left: 2px solid var(--txt-strong);
    padding: 10px 16px;
    background: rgba(255,255,255,0.45);
    border-radius: 0 var(--radius) var(--radius) 0;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .why-label {
    font-family: "Doto", sans-serif;
    font-weight: 900;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--txt-strong);
    margin-bottom: 4px;
  }
  .why p {
    font-family: "Special Elite", monospace;
    font-size: 13px;
    line-height: 1.6;
    color: var(--txt);
    margin: 0;
  }

  .entry-footer {
    margin-top: 10px;
    font-family: "Doto", sans-serif;
    font-size: 11px;
    color: rgba(123,123,123,0.75);
    letter-spacing: 0.06em;
  }
  .entry-footer code {
    background: rgba(255,255,255,0.6);
    padding: 1px 6px;
    border-radius: 4px;
    color: var(--txt-strong);
    font-size: 0.92em;
  }

  a {
    color: var(--txt-strong);
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  a:hover { color: var(--txt); }

  /* Stats strip */
  .stats {
    display: flex;
    gap: 26px;
    margin: 8px 0 28px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,1);
    border-radius: var(--radius);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-num {
    font-family: "acumin-pro-condensed", sans-serif;
    font-weight: 600;
    font-size: 28px;
    color: var(--txt-strong);
    line-height: 1;
  }
  .stat-label {
    font-family: "Doto", sans-serif;
    font-weight: 800;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--txt);
  }

  /* Empty state */
  .empty {
    display: none;
    padding: 40px 20px;
    text-align: center;
    font-family: "Special Elite", monospace;
    font-size: 13px;
    color: var(--txt);
  }
  .empty.visible { display: block; }

  @media (max-width: 720px) {
    .page { padding: 60px 22px 120px; }
    h1 { font-size: clamp(32px, 9vw, 48px); }
    .timeline { padding-left: 22px; }
    .entry::before { left: -22px; }
    .stats { gap: 16px; padding: 12px 14px; }
    .stat-num { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="dot-grid" aria-hidden="true"></div>

<div class="page">

  <div class="page-header">
    <h1>Changelog<br>&amp; Devlog</h1>
    <p class="subtitle">
      What changed on Nūfik v2, day by day — paired with the reasoning behind
      each call. The top entries are the most recent. Filter by tag to focus on
      design decisions, additions, removals, or fixes.
    </p>
  </div>

  <!-- Quick stats -->
  <div class="stats">
    <div class="stat">
      <span class="stat-num" id="stat-entries">—</span>
      <span class="stat-label">Entries</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-days">—</span>
      <span class="stat-label">Active days</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-latest">—</span>
      <span class="stat-label">Latest</span>
    </div>
    <div class="stat">
      <span class="stat-num">v2</span>
      <span class="stat-label">Branch</span>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters" id="filters" role="group" aria-label="Filter by tag">
    <button class="chip active" data-filter="all">All</button>
    <button class="chip" data-filter="added">Added</button>
    <button class="chip" data-filter="changed">Changed</button>
    <button class="chip" data-filter="removed">Removed</button>
    <button class="chip" data-filter="fixed">Fixed</button>
    <button class="chip" data-filter="design">Design</button>
    <button class="chip" data-filter="decision">Decision</button>
  </div>

  <!-- Timeline -->
  <div class="timeline" id="timeline">
    <!-- entries injected by JS -->
  </div>

  <div class="empty" id="empty">No entries match this filter.</div>

</div>

<script>
  /* ───────────────────────────────────────────────────
     Entries live here. Newest first. To add a new day,
     prepend an object to the array. Tags drive both color
     and filtering. Keep "why" short — one or two sentences.
     ─────────────────────────────────────────────────── */
  const entries = [
    {
      date: "2026-06-24",
      title: "Editorial blocks — letter / polaroids / pair / stack + per-project Tone",
      tags: ["added", "design"],
      body: `
        <p>Four new content tokens for project bodies, modeled after the
          333 Figma layout — composable from Notion so every project can
          mix them freely. All take a single paragraph block.</p>
        <ul>
          <li><code>{{letter:Nū}}</code> — single oversized display
            letterform, <code>clamp(60px, 11vw, 140px)</code>
            acumin-pro-condensed with soft-light blend so it reads as a
            typographic break embossed into the page tone.</li>
          <li><code>{{polaroids:a.jpg@-12,b.jpg,c.jpg@8}}</code> —
            rotated photo cluster; comma-separated filenames with optional
            <code>@&lt;deg&gt;</code> rotation per item, hover scales each
            card.</li>
          <li><code>{{pair:a.jpg|b.jpg}}</code> — two large mockups side
            by side, edge-to-edge across the viewport at 1400:933 aspect.</li>
          <li><code>{{stack:a.jpg|b.jpg|c.jpg|d.jpg|indent=1,2}}</code> —
            full-bleed vertical stack with optional <code>indent=</code>
            list (0-based indices that sit inset 40px each side to break
            rhythm).</li>
        </ul>
        <p>Also: project detail title scales up from
          <code>clamp(24px, 2.4vw, 36px)</code> to
          <code>clamp(72px, 12vw, 150px)</code> so it works as a magazine
          display headline instead of a sidebar label.</p>
        <p>New Notion DB property <code>Tone</code> (rich text, hex like
          <code>#906e47</code>) — when set, overrides the <code>--ink</code>
          CSS variable on page load so each project tints its detail page
          to its brand color. Denim texture + soft-light blend ride on top
          so the texture reads correctly against the new tone.</p>
        <p>Usage docs:
          <a href="handoff.html#content-tokens">handoff.html → Notion content tokens</a>.</p>
      `,
      why: `333's Figma mockup uses a brown/sepia page tone, oversized title, rotated photo cluster, paired mockups, and full-bleed stack — none of which the previous renderer could express. Putting each layout shape behind a Notion token (instead of one-off project HTML) means future projects can compose their own editorial story without code changes, while keeping the simple cases (single image, paragraph, video) the same. Tone moves the design system from "one neutral background" to "each project owns its own color world".`,
      ref: ""
    },
    {
      date: "2026-06-23",
      title: "Slider renderer wired into project.html (frames + autoplay option)",
      tags: ["added", "design"],
      body: `
        <p>Project detail body now renders the
          <code>{{slider:a.png|b.png|c.png|autoplay=true|caption=…}}</code>
          token (parsed by the earlier
          <code>scripts/sync-notion.mjs</code> work) as a horizontal CSS
          scroll-snap carousel with pagination dots underneath. Reads
          the <code>frames[]</code> array and respects the
          <code>autoplay</code> / <code>caption</code> options that come
          out of the parser.</p>
        <ul>
          <li>Opt-in auto-advance via <code>autoplay=true</code> — off
            unless the designer asks for it. When on, cycles every
            <strong>2.5s</strong> while in viewport.</li>
          <li>Custom RAF tween — ease-in-out cubic, 900ms — replaces
            <code>scrollTo({behavior:'smooth'})</code> so timing is
            consistent across devices.</li>
          <li>Pointer/wheel during a tween cancels it instantly so finger
            input always wins; auto-play stops permanently only when the
            user explicitly clicks a dot.</li>
          <li>Pauses when scrolled out of view (IntersectionObserver,
            threshold 0.4) so battery isn't burning on off-screen
            sliders.</li>
          <li>Honors <code>prefers-reduced-motion</code> — no auto cycle
            for that audience.</li>
        </ul>
        <p>Usage docs:
          <a href="handoff.html#content-tokens">handoff.html → Notion content tokens</a>.
          UI exploration alternatives live in
          <a href="slider-demo.html">slider-demo.html</a> (V1–V4 + V3a–V3d).</p>
      `,
      why: `The slider-demo page proved the auto-scroll-snap (V4 + V3 dwell) variant felt right for showcasing brand artifacts. Wiring it into the real renderer was the missing piece — designer can now write the token in Notion and have a working slider on the live page after sync, with the option to keep it manual (default) or auto-cycling.`,
      ref: "commits 4822191 (parser+demo) · ee3f4bf (V3a–V3d)"
    },
    {
      date: "2026-05-24",
      title: "Denim on body + dot grid pulse on about/contact",
      tags: ["changed", "design"],
      body: `
        <p>Pulled the denim texture off the fixed <code>.denim-texture</code>
        element on about and contact and put it directly on <code>body</code>
        via <code>background-image</code> + <code>background-blend-mode: soft-light</code>.
        Added the same scroll-driven scale/blur on <code>.dot-grid</code> as the
        index gallery, plus an entrance pulse that ships <code>.is-scrolling</code>
        in the markup and lets JS remove it after first paint so the dots ease
        from blurred to crisp.</p>
      `,
      why: `Mobile rubber-band bounce was exposing untextured gray under the content because the fixed denim didn't follow the bounce, while the half-transparent content boxes did. Body-bg denim is part of the scroll surface, so intensity stays constant. The pulse + entrance unify motion language across the three main pages.`,
      ref: ""
    },
    {
      date: "2026-05-24",
      title: "About mobile — non-focused blocks blur out",
      tags: ["added", "design"],
      body: `
        <p>Every <code>.block</code> in the about column starts at
        <code>filter: blur(3px); opacity: 0.45</code> on mobile; only the block
        nearest viewport center (<code>.in-focus</code>, toggled by the existing
        center-of-viewport loop) stays sharp.</p>
      `,
      why: `Mirrors the gallery's center-vs-blur language so the cards feel like part of the same motion vocabulary. On a small screen it also stops the column from competing with itself — your eye lands where the design wants it.`,
      ref: ""
    },
    {
      date: "2026-05-24",
      title: "Contact — click to flip business cards",
      tags: ["added"],
      body: `
        <p>Clicking <code>.biz-hero</code> toggles a <code>.flipped</code> class
        that swaps z-index between front and back, so the visitor can alternate
        which side sits on top without leaving the page. Hover transforms stay
        wired to the same selectors and keep working on either state.</p>
      `,
      why: `Both card faces (Biz_01 / Biz_02) live in the composition but only the back was reachable. A click toggle is the lightest possible affordance — no carousel, no flip-3D, just z-index swap that matches the card's existing rotation language.`,
      ref: ""
    },
    {
      date: "2026-05-24",
      title: "Safe-area insets in, theme-color + PWA meta out",
      tags: ["changed", "fix"],
      body: `
        <p>Added <code>viewport-fit=cover</code> across all four pages and
        switched fixed nav / slide-meta offsets to
        <code>calc(28px + env(safe-area-inset-top))</code> /
        <code>calc(20px + env(safe-area-inset-bottom))</code> so the capsule
        clears the notch and home indicator. Tried
        <code>theme-color="#E7E7E7"</code> +
        <code>apple-mobile-web-app-status-bar-style</code> earlier in the
        session but reverted — a solid bar didn't blend with the denim+dot
        texture and created a visible seam. Also rolled back
        <code>overscroll-behavior-y: none</code>; the rigid scroll feel was
        worse than the denim reveal it was meant to fix.</p>
      `,
      why: `Safe-area insets are pure win: env() reports 0 in regular Safari, so it only acts when there's actually a notch / home-indicator to clear. The PWA meta tags only do anything when the page is added to home screen; we're not optimising for that path, and keeping Safari's translucent URL bar reads more naturally over a textured background than a flat color match ever could.`,
      ref: ""
    },
    {
      date: "2026-05-24",
      title: "Mobile poster opacity, contact framing pass",
      tags: ["changed", "design"],
      body: `
        <p>Mobile <code>.bg-poster</code> on contact dropped from
        <code>opacity: 0.48 → 0.10</code> to match desktop. Earlier in the same
        session the poster was scaled to fill viewport height
        (<code>height: calc(100lvh + 40px)</code>, shifted up 40px to avoid
        clipping the bottom), and the content top padding was halved
        (70px → 35px) on mobile.</p>
      `,
      why: `0.48 was an artifact of the earlier width-based sizing — at full mobile bleed it read as a second hero competing with the cards. One opacity across breakpoints lets the poster work as ambient depth instead of feature.`,
      ref: ""
    },
    {
      date: "2026-05-24",
      title: "Project detail meta — 12px type, mobile 2-col Category/Year",
      tags: ["changed", "design"],
      body: `
        <p>Project detail page meta cluster: label / value / description type
        scales 15px → 12px on every viewport. On mobile, Category + Year share
        one row via a 2-column grid, Description spans full width, and the
        Back pill stays at its intrinsic width via
        <code>justify-self: start</code>.</p>
      `,
      why: `15px was too loud next to the body copy; 12px reads as a quiet sidebar. Stacking Category and Year vertically on mobile wasted vertical space — side-by-side keeps the meta a compact block above the case study.`,
      ref: "commit 5d99d91"
    },
    {
      date: "2026-05-24",
      title: "Index gallery scroll — flex → block",
      tags: ["fix"],
      body: `
        <p><code>#gallery</code> was a flex row container; flex sizing didn't
        expose the full intrinsic height of the track to
        <code>overflow-y: scroll</code>, so only 2–3 of the 5 Notion projects
        were ever reachable. Switched to plain block layout — the track now
        grows to its natural ~2.4× viewport height and every project scrolls
        into view. Desktop top padding trimmed 50vh → 22vh so the first cover
        sits closer to the nav.</p>
      `,
      why: `Five projects had been synced from Notion but the rendered list felt locked at three. The diagnosis ran through align-items tweaks and an aborted infinite-scroll attempt before the real culprit (flex container hiding overflow height) showed itself. Block layout is the right level of complexity for a vertical-only scroller.`,
      ref: "commit ad4adf5"
    },
    {
      date: "2026-05-23",
      title: "Poster background on contact (plus-darker, right-anchored)",
      tags: ["added", "design"],
      body: `
        <p>Added <code>src/poster.jpg</code> as the topmost background layer on
        the contact page. Anchored to the viewport's right edge so it scales
        with the screen without leaving an empty right side on wide displays.
        Blend mode <code>plus-darker</code>; opacity 0.10 on desktop, 0.48 on
        mobile (Figma spec retained for small screens where the poster reads
        as a hero).</p>
      `,
      why: `Wanted a brand artifact behind the cards instead of plain texture — gives the page a quiet depth without competing with the business-card composition. The plus-darker mode keeps it tonal, never colored.`,
      ref: "commit 05d9080"
    },
    {
      date: "2026-05-23",
      title: "About — single-gray type system, lighter weights",
      tags: ["changed", "design"],
      body: `
        <p>Tightened the About page typography: section titles switched to
        <code>Special Elite</code> 20px (no uppercase), the big quote drops to
        weight 700 at 34px, body copy now Special Elite 15px. CTA pill uses
        <code>acumin-pro-condensed</code> 700 (previously a non-existent
        <em>-black</em> alias that was silently falling back). All text colors
        collapsed to a single <code>--txt</code> (#7B7B7B), removing the faded
        70%/75% variations.</p>
      `,
      why: `The About voice was getting fragmented — three different gray opacities and an unloaded font weight made the page feel "designed by committee". Pulling everything to one tone lets the writing carry the personality instead of the styling.`,
      ref: "commit 05d9080"
    },
    {
      date: "2026-05-23",
      title: "Devlog + changelog page",
      tags: ["added", "design"],
      body: `
        <p>New <code>intro/changelog.html</code> page that combines a dated
        changelog with a design devlog. Each entry carries tags, a body, and a
        short "why" panel. Filterable by tag.</p>
      `,
      why: `Handoff snapshots get rewritten every session, so the reasoning behind decisions kept getting lost. A running log preserves it.`,
      ref: ""
    },
    {
      date: "2026-05-23",
      title: "Handoff snapshot page",
      tags: ["added"],
      body: `
        <p>Added <code>intro/handoff.html</code> — a single self-contained page
        summarising current state of v2: setup commands, recent commits, color
        + type tokens, page-by-page status, open decisions, button explorations,
        and project rules.</p>
      `,
      why: `Anyone (or future-me on another machine) should be able to git pull and have a complete picture in one read.`,
      ref: "intro/handoff.html"
    },
    {
      date: "2026-05-21",
      title: "Button explorations — five pill variants",
      tags: ["design", "decision"],
      body: `
        <p>Comparison page at <code>intro/button-demo.html</code> with five
        takes on the "bitmap dots dissolving toward the edge" pill button.</p>
        <ul>
          <li><strong>V1</strong> White pill + single outer dot halo</li>
          <li><strong>V2</strong> White pill, dots printed inside, sparser at the edge</li>
          <li><strong>V3</strong> White pill + two-ring halo (medium near, small far)</li>
          <li><strong>V4 (A)</strong> Gray pill, rim roughened by SVG turbulence + displacement</li>
          <li><strong>V5 (B)</strong> Gray pill, true halftone dots via SVG filter chain — closest to the reference</li>

  /* ─────────── Render ─────────── */
  const tl = document.getElementById("timeline");
  const empty = document.getElementById("empty");
  let activeFilter = "all";

  function tagHTML(tags) {
    return tags.map(t => `<span class="tag ${t}">${t}</span>`).join("");
  }

  function render() {
    tl.innerHTML = "";
    let visible = 0;
    entries.forEach((e, i) => {
      if (activeFilter !== "all" && !e.tags.includes(activeFilter)) return;
      visible++;
      const el = document.createElement("article");
      el.className = "entry";
      el.innerHTML = `
        <div class="entry-date">${e.date}</div>
        <h2 class="entry-title">${e.title}</h2>
        <div class="entry-meta">${tagHTML(e.tags)}</div>
        <div class="entry-body">${e.body}</div>
        ${e.why ? `
          <div class="why">
            <div class="why-label">Why</div>
            <p>${e.why}</p>
          </div>
        ` : ""}
        ${e.ref ? `<div class="entry-footer">${e.ref}</div>` : ""}
      `;
      tl.appendChild(el);
    });
    empty.classList.toggle("visible", visible === 0);
  }

  /* ─────────── Stats ─────────── */
  function renderStats() {
    document.getElementById("stat-entries").textContent = entries.length;
    const uniqueDays = new Set(entries.map(e => e.date));
    document.getElementById("stat-days").textContent = uniqueDays.size;
    document.getElementById("stat-latest").textContent = entries[0]?.date.slice(5).replace("-", "/") || "—";
  }

  /* ─────────── Filters ─────────── */
  document.getElementById("filters").addEventListener("click", (e) => {
    const btn = e.target.closest(".chip");
    if (!btn) return;
    activeFilter = btn.dataset.filter;
    document.querySelectorAll(".chip").forEach(c => c.classList.toggle("active", c === btn));
    render();
  });

  renderStats();
  render();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E7E7E7">
  <title>Contact — Nūfik</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;500;700;800;900&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/bvc3fac.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink:    #E7E7E7;
      --point:  #BBBBBB;
      --line:   #BBBBBB;
      --accent: #7B7B7B;
      --txt:    #7B7B7B;

      --capsule-fill: rgba(255,255,255,0.4);
      --capsule-line: rgba(255,255,255,1);
      --dot:          rgba(123,123,123,0.18);
      --txt-strong:   #090909;
      --radius:       10px;
    }

    html {
      overflow-y: scroll;          /* 항상 스크롤바 표시 → 콘텐츠 시프트 방지 */
      scrollbar-gutter: stable;
    }
    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--ink);
      color: var(--txt);
      overflow-x: hidden;
    }

    /* Poster background (Figma: poster_2, 1014×1437, plus-darker)
       Desktop anchored to right edge, scales up to fill viewport on wide screens
       Desktop opacity lowered (0.30) for a softer feel; mobile keeps Figma 0.48 */
    .bg-poster {
      position: fixed;
      top: -149px;
      right: 0;
      left: auto;
      transform: none;
      transform-origin: right top;
      width: max(1014px, 100vw);
      max-width: none;
      height: auto;
      pointer-events: none;
      opacity: 0.10;
      mix-blend-mode: plus-darker;
      z-index: 1;
    }

    /* Denim fabric texture (Figma: seamless tile, mix-blend soft-light) */
    .denim-texture {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image: url("src/denim_texture.jpg");
      background-size: 256px 256px;
      background-repeat: repeat;
      mix-blend-mode: soft-light;
      opacity: 0.9;
    }

    .dot-grid {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1.5px);
      background-size: 32px 32px;
      background-position: 0 0;
    }

    /* Bottom blur SVG (used across pages, fixed bottom-center) */
    .bg-blur {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translate(calc(-50% - 116px), 0);
      width: calc(100vw + 400px);
      min-width: 1280px;
      height: auto;
      pointer-events: none;
      opacity: 0.7;
      z-index: 4;
    }

    @media (max-width: 900px) {
      /* Mobile: scale poster by viewport height so it fills the screen.
         Sized 40px taller than viewport and shifted up 40px so framing
         lifts without clipping the bottom. lvh covers the largest
         visible area (incl. when iOS URL bar collapses). */
      .bg-poster {
        top: -40px;
        left: auto;
        right: 0;
        transform: none;
        transform-origin: right top;
        width: auto;
        height: calc(100vh + 40px);
        height: calc(100lvh + 40px);
        opacity: 0.48;
      }
    }

    /* Nav capsule */
    .nav-capsule {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: min(840px, calc(100% - 56px));
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4.2rem;
      padding: 12px 32px;
      background: var(--capsule-fill);
      border: 1px solid var(--capsule-line);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .nav-logo { display: inline-flex; align-items: center; text-decoration: none; }
    .nav-logo svg { width: 72px; height: auto; display: block; }
    .nav-logo svg .st0 { fill: var(--txt); }
    .nav-links {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 2.6rem;
      padding: 0; margin: 0;
    }
    .nav-links a {
      font-family: "Doto", sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--txt);
      text-decoration: none;
      transition: color 200ms ease;
    }
    .nav-links a.active { color: var(--txt-strong); font-weight: 900; }
    .nav-links a:not(.active):hover { color: var(--txt-strong); }

    /* ── content wrapper ── */
    .content {
      position: relative;
      min-height: 100vh;
      padding: 100px 24px 100px;
      z-index: 10;
      opacity: 0;
      transition: opacity 540ms ease;
    }
    .content.visible { opacity: 1; }

    /* ── Business card hero ── */
    /* Figma spec: Biz_01 447×262 −6.64°, Biz_02 447×262 +3.06° */
    .biz-hero {
      position: relative;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      height: clamp(280px, 30vw, 400px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .biz-card {
      position: absolute;
      width: clamp(300px, 32vw, 447px);
      aspect-ratio: 447 / 262;
      height: auto;
      border-radius: 1px;
      box-shadow: 0 4px 4px rgba(0,0,0,0.25);
      transition: transform 600ms cubic-bezier(0.22,1,0.36,1);
      user-select: none;
      -webkit-user-drag: none;
    }
    .biz-card-front {
      transform: translate(-34%, -8%) rotate(-6.64deg);
      z-index: 1;
    }
    .biz-card-back {
      transform: translate(34%, 8%) rotate(3.06deg);
      z-index: 2;
    }
    @media (hover: hover) {
      .biz-hero:hover .biz-card-front { transform: translate(-36%, -9%) rotate(-7.5deg); }
      .biz-hero:hover .biz-card-back  { transform: translate(36%, 9%) rotate(4.2deg); }
    }

    /* ── Contact info blocks ── */
    /* Figma spec: 389×93 white blocks, ±48.5px stagger, opacity 100/80/60, slight vertical overlap */
    .contact-blocks {
      position: relative;
      width: 389px;
      max-width: 100%;
      margin: 36px auto 0;
    }
    .contact-block {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
      width: 389px;
      max-width: 100%;
      height: 93px;
      padding: 0 20px;
      background: #ffffff;
      text-decoration: none;
      color: var(--txt);
      transition: transform 320ms cubic-bezier(0.22,1,0.36,1), opacity 200ms ease, box-shadow 200ms ease;
    }
    .contact-block + .contact-block { margin-top: -9px; }

    .cb-email     { transform: translateX(48.5px);  opacity: 1;   z-index: 3; }
    .cb-instagram { transform: translateX(-48.5px); opacity: 0.8; z-index: 2; }
    .cb-linkedin  { transform: translateX(48.5px);  opacity: 0.6; z-index: 1; }

    .contact-block:hover {
      opacity: 1;
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    }
    .cb-email:hover     { transform: translateX(48.5px)  translateY(-2px); }
    .cb-instagram:hover { transform: translateX(-48.5px) translateY(-2px); }
    .cb-linkedin:hover  { transform: translateX(48.5px)  translateY(-2px); }

    .cb-label {
      font-family: acumin-pro-condensed, sans-serif;
      font-weight: 700;
      font-style: normal;
      font-size: 20px;
      line-height: 1;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--txt);
      margin: 0;
    }
    .cb-meta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      font-family: "Special Elite", "lumios-typewriter-used", monospace;
      font-weight: 400;
      font-size: 15px;
      line-height: 1;
      letter-spacing: 0;
      color: var(--txt);
    }
    .cb-desc {
      opacity: 0.5;
      white-space: nowrap;
    }
    .cb-value {
      white-space: pre;
      color: var(--txt);
    }

    /* ── Mobile ── */
    @media (max-width: 900px) {
      .nav-capsule {
        top: auto;
        bottom: 20px;
        width: calc(100% - 40px);
        gap: 20px;
        padding: 10px 20px;
      }
      .nav-logo svg { width: 60px; }
      .nav-links { gap: 24px; }
      .nav-links a { font-size: 13px; letter-spacing: 0.1em; }

      .dot-grid { background-size: 24px 24px; }

      .content { padding: 35px 20px 100px; }

      .biz-hero {
        height: clamp(340px, 72vw, 500px);
      }
      .biz-card {
        width: clamp(260px, 78vw, 420px);
      }
      .biz-card-front { transform: translate(-3%, -22%) rotate(-6.64deg); }
      .biz-card-back  { transform: translate(3%, 22%) rotate(3.06deg); }
      @media (hover: hover) {
        .biz-hero:hover .biz-card-front { transform: translate(-3%, -22%) rotate(-6.64deg); }
        .biz-hero:hover .biz-card-back  { transform: translate(3%, 22%) rotate(3.06deg); }
      }

      .contact-blocks {
        width: calc(100% - 24px);
        margin-top: 40px;
      }
      .contact-block {
        width: 100%;
        height: auto;
        padding: 18px 22px;
      }
      .contact-block + .contact-block { margin-top: 14px; }
      .cb-email,
      .cb-instagram,
      .cb-linkedin {
        transform: none;
        opacity: 1;
      }
      .cb-email:hover,
      .cb-instagram:hover,
      .cb-linkedin:hover { transform: translateY(-2px); }

      .cb-label { font-size: 18px; }
      .cb-meta {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        font-size: 13px;
      }
      .cb-value { white-space: normal; }
    }
  </style>
</head>
<body>

<img class="bg-poster" src="src/poster.jpg" alt="" aria-hidden="true">
<div class="denim-texture" aria-hidden="true"></div>
<div class="dot-grid" aria-hidden="true"></div>
<img class="bg-blur" src="src/bg_blur.svg" alt="" aria-hidden="true">

<header class="nav-capsule" role="banner">
  <a href="index.html" class="nav-logo" aria-label="Nufik home">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 751.5 208.1">
      <polygon class="st0" points="157.1 118.1 55.5 9 0 9 0 205.3 51 205.3 51 83 56.4 83 170.2 205.3 208.1 205.3 208.1 9 157.1 9 157.1 118.1"/>
      <path class="st0" d="M333.9,129c0,7.3-1.4,13.7-4.1,19.1-2.7,5.4-6.4,9.6-11.1,12.5-4.7,2.9-9.9,4.3-15.7,4.3s-14.2-2.5-18.5-7.4c-4.3-5-6.5-12.2-6.5-21.7v-70.7h-46.6v80.8c0,19.3,4.9,34.5,14.7,45.6,9.8,11.1,23,16.7,39.7,16.7s20.5-2.5,28.9-7.4c8-4.7,14.4-11.5,19.1-20.3v24.9s46.6,0,46.6,0V65.1h-46.6v63.9Z"/>
      <rect class="st0" x="257.1" y="9" width="99" height="32.5"/>
      <polygon class="st0" points="751.5 205.3 682.8 132.5 745.6 65.1 688.1 65.1 624.5 125.6 624.5 9 577.7 9 577.7 205.3 624.5 205.3 624.5 141.6 691.8 205.3 751.5 205.3"/>
      <path class="st0" d="M530.8,111.9h-23.4v-23.4h23.4v-23.4h-67.2v-4.8c0-6.9,2.2-12.3,6.6-16.1,4.4-3.8,11.8-5.8,22.3-5.8s16.8.8,25.8,2.4c9,1.6,17.8,3.9,26.4,6.9h.8V7.9c-7.1-2.2-15.7-4.1-25.8-5.6-10.1-1.5-19.4-2.2-28-2.2-16.8,0-30.9,2.5-42.1,7.4-11.2,5-19.5,11.9-24.8,20.9-5.3,9-8,19.5-8,31.7v5h-18.8v46.9h18.8v93.4h46.8v-93.4h43.8v93.4h46.8v-116.8h-23.4v23.4Z"/>
    </svg>
  </a>
  <nav>
    <ul class="nav-links">
      <li><a href="index.html">Work</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>
</header>

<main class="content" id="content">
  <section class="biz-hero" aria-label="Business cards">
    <img class="biz-card biz-card-front" src="src/Biz_01.png" alt="Nūfik business card — front">
    <img class="biz-card biz-card-back"  src="src/Biz_02.png" alt="Nūfik business card — back">
  </section>

  <section class="contact-blocks" aria-label="Contact channels">
    <a class="contact-block cb-email" href="mailto:hello@nura.co.kr">
      <h3 class="cb-label">Email</h3>
      <div class="cb-meta">
        <span class="cb-desc">for inquiries</span>
        <span class="cb-value">[  hello@nura.co.kr  ]</span>
      </div>
    </a>

    <a class="contact-block cb-instagram" href="https://instagram.com/this.is_nura" target="_blank" rel="noopener">
      <h3 class="cb-label">Instagram</h3>
      <div class="cb-meta">
        <span class="cb-desc">behind the scenes</span>
        <span class="cb-value">[  @this.is_nura  ]</span>
      </div>
    </a>

    <a class="contact-block cb-linkedin" href="https://www.linkedin.com/in/nura-lee" target="_blank" rel="noopener">
      <h3 class="cb-label">LinkedIn</h3>
      <div class="cb-meta">
        <span class="cb-desc">career &amp; beyond</span>
        <span class="cb-value">[  nura-lee  ]</span>
      </div>
    </a>
  </section>
</main>

<script>
  window.addEventListener('load', () => {
    // Wait for webfonts to load before fade-in so text reflow happens BEFORE animation (prevents sideways glitch from FOUT)
    const reveal = () => document.getElementById('content').classList.add('visible');
    if (document.fonts && document.fonts.ready) {
      Promise.race([
        document.fonts.ready,
        new Promise(r => setTimeout(r, 1500))
      ]).then(() => setTimeout(reveal, 60));
    } else {
      setTimeout(reveal, 130);
    }
  });
</script>

</body>
</html>

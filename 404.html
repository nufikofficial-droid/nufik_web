    /* grain overlay */
    .grain {
      position: fixed;
      inset: -50%;
      width: 200%; height: 200%;
      pointer-events: none;
      z-index: 99;
      opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      animation: gr 0.35s steps(2) infinite;
    }
    @keyframes gr {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(-1%,-2%); }
      50%  { transform: translate(2%,1%); }
      75%  { transform: translate(-2%,2%); }
    }

    /* ── side panels (메인과 동일) ── */
    .side-panel {
      position: fixed;
      top: 0; bottom: 0;
      z-index: 125;
      display: flex;
      align-items: stretch;
      pointer-events: none;
      opacity: 0.5;
    }
    .side-panel.left  { left: 0;  flex-direction: row; }
    .side-panel.right { right: 0; flex-direction: row-reverse; }
    .side-panel .sp-txt {
      width: 26px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 28px 0;
    }
    .side-panel .sp-txt span {
      font-family: "trapix", monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--line);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      white-space: nowrap;
    }
    .side-panel .sp-line {
      width: 1px;
      background: var(--line);
    }

    /* ── nav-logo: 좌상단 고정 ── */
    .nav-logo {
      position: fixed;
      top: 0; left: 27px;
      width: calc((100% - 54px) / 3);
      padding: 30px;
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transition: opacity 460ms ease;
    }
    .nav-logo.visible { opacity: 1; pointer-events: auto; }
    .nav-logo svg {
      width: 120px;
      height: auto;
      display: block;
    }

    /* ── site-nav: 우상단 그리드 고정 (메인과 동일) ── */
    .site-nav {
      position: fixed;
      top: 0;
      left: calc(27px + (100% - 54px) / 3.5 * 2.5);
      width: calc((100% - 54px) / 3.5);
      height: calc(100% / 3);
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transition: opacity 460ms ease;
    }
    .site-nav.visible { opacity: 1; }
    .site-nav.visible .nav-links { pointer-events: auto; }
    .nav-links {
      display: flex;
      flex-direction: row;
      align-items: center;
      list-style: none;
      padding: 0; margin: 0;
      gap: 1.2rem;
    }
    .nav-links a {
      font-family: acumin-pro-wide, sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--txt);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--accent); }

    /* ── center content ── */
    .content {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      text-align: center;
      z-index: 10;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 540ms ease, transform 540ms cubic-bezier(0.22,1,0.36,1);
    }
    .content.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .error-code {
      font-family: acumin-pro-wide, sans-serif;
      font-weight: 700;
      font-style: normal;
      font-size: clamp(80px, 14vw, 180px);
      line-height: 1;
      color: color-mix(in srgb, var(--txt) 12%, transparent);
      letter-spacing: -0.03em;
      user-select: none;
    }
    .error-msg {
      font-family: acumin-pro-wide, sans-serif;
      font-weight: 700;
      font-style: normal;
      font-size: clamp(18px, 2.5vw, 32px);
      color: var(--txt);
      letter-spacing: -0.01em;
      text-transform: uppercase;
    }
    .error-sub {
      font-family: "trapix", monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--line);
      margin-top: -0.5rem;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — Nūfik</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;500;700;800;900&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/bvc3fac.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink:    #E7E7E7;
      --point:  #BBBBBB;
      --line:   #BBBBBB;
      --accent: #7B7B7B;
      --txt:    #7B7B7B;
    }

    :root {
      --capsule-fill: rgba(255,255,255,0.4);
      --capsule-line: rgba(255,255,255,1);
      --dot:          rgba(123,123,123,0.18);
      --txt-strong:   #090909;
      --radius:       10px;
    }

    /* Denim fabric texture (shared bg layer 1) */
    .denim-texture {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: url("src/denim_texture.jpg");
      background-size: 256px 256px;
      background-repeat: repeat;
      mix-blend-mode: soft-light;
      opacity: 0.9;
    }

    /* Background dot grid (shared with index) */
    .dot-grid {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1.5px);
      background-size: 32px 32px;
      background-position: 0 0;
    }

    /* Bottom blur SVG (shared bg layer 3) */
    .bg-blur {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translate(calc(-50% - 116px), 0);
      width: calc(100vw + 400px);
      min-width: 1280px;
      height: auto;
      pointer-events: none;
      opacity: 0.7;
      z-index: 3;
    }

    /* Nav capsule (shared with index) */
    .nav-capsule {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: min(840px, calc(100% - 56px));
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4.2rem;
      padding: 12px 32px;
      background: var(--capsule-fill);
      border: 1px solid var(--capsule-line);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .nav-logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .nav-logo svg { width: 72px; height: auto; display: block; }
    .nav-logo svg .st0 { fill: var(--txt); }
    .nav-links {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 2.6rem;
      padding: 0; margin: 0;
    }
    .nav-links a {
      font-family: "Doto", sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--txt);
      text-decoration: none;
      transition: opacity 200ms ease, color 200ms ease;
    }
    .nav-links a.active { color: var(--txt-strong); font-weight: 900; }
    .nav-links a:not(.active):hover { color: var(--txt-strong); }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--ink);
      color: var(--txt);
    }



    /* ── project content layout ── */
    .content {
      position: relative;
      height: 100vh;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: calc(100% / 3.5) 1fr calc(100% / 3.5);
      padding: 0 27px;
      z-index: 10;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 540ms ease, transform 540ms cubic-bezier(0.22,1,0.36,1);
    }

    /* ── project body (case study blocks) ── */
    .proj-body {
      position: relative;
      z-index: 10;
      max-width: 880px;
      margin: 0 auto;
      padding: 60px 24px 160px;
      opacity: 0;
      transition: opacity 540ms ease;
    }
    .proj-body.visible { opacity: 1; }
    .pb-heading {
      font-family: "acumin-pro-condensed-black", sans-serif;
      font-weight: 800;
      font-size: clamp(18px, 1.6vw, 26px);
      letter-spacing: 0.04em;
      color: var(--txt);
      margin: 3rem 0 1.2rem;
    }
    .pb-heading.lvl-3 { font-size: clamp(14px, 1.2vw, 18px); }
    .pb-paragraph {
      font-family: lumios-typewriter-used, sans-serif;
      font-weight: 400;
      font-style: normal;
      font-size: 17px;
      letter-spacing: 0.06em;
      line-height: 1.7;
      color: var(--txt);
      margin: 0 0 1.4rem;
    }
    .pb-quote {
      border-left: 2px solid var(--accent);
      padding: 0.6rem 0 0.6rem 1.4rem;
      margin: 2rem 0;
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 12px;
      line-height: 1.8;
      color: var(--txt);
    }
    .pb-list {
      margin: 0 0 1.4rem 1.4rem;
      padding: 0;
    }
    .pb-list li {
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 11px;
      letter-spacing: 0.06em;
      line-height: 1.95;
      color: color-mix(in srgb, var(--txt) 75%, transparent);
      margin-bottom: 0.5rem;
    }
    .pb-divider {
      border: 0;
      border-top: 1px solid color-mix(in srgb, var(--line) 25%, transparent);
      margin: 3rem 0;
    }
    .pb-media {
      margin: 2rem 0;
    }
    .pb-media img,
    .pb-media video {
      width: 100%;
      height: auto;
      display: block;
      background: var(--ink);
    }
    .pb-caption {
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--line) 55%, transparent);
      margin-top: 0.6rem;
    }
    .pb-empty {
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--line) 55%, transparent);
      text-align: center;
      padding: 60px 0;
    }
    .content.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* left column: empty spacer (was rotated title) */
    .proj-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 100px 30px 80px;
    }
    .proj-title {
      font-family: "acumin-pro-condensed-black", sans-serif;
      font-weight: 800;
      font-size: clamp(20px, 2vw, 28px);
      line-height: 1.1;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--txt);
      margin: 0 0 1.4rem;
    }

    /* center column: image placeholder */
    .proj-center {
      display: flex;
      flex-direction: column;
      padding: 80px 20px;
    }
    .proj-img-placeholder {
      flex: 1;
      background: color-mix(in srgb, var(--point) 55%, transparent);
      border: 1px solid color-mix(in srgb, var(--line) 25%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .proj-img-label {
      font-family: lumios-typewriter-used, sans-serif;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--line) 45%, transparent);
      user-select: none;
    }

    /* right column: meta */
    .proj-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 100px 30px 80px;
      gap: 1.8rem;
    }
    .proj-meta-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .proj-meta-label {
      font-family: lumios-typewriter-used, sans-serif;
      font-weight: 400;
      font-style: normal;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: underline;
      text-underline-offset: 0.25em;
      color: color-mix(in srgb, var(--txt) 70%, transparent);
    }
    .proj-meta-value {
      font-family: lumios-typewriter-used, sans-serif;
      font-weight: 400;
      font-style: normal;
      font-size: 15px;
      letter-spacing: 0.05em;
      color: var(--txt);
    }
    .proj-desc {
      font-family: lumios-typewriter-used, sans-serif;
      font-weight: 400;
      font-style: normal;
      font-size: 15px;
      letter-spacing: 0.05em;
      line-height: 1.7;
      color: var(--txt);
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      border: 1px solid var(--line);
      font-family: "acumin-pro-condensed-black", sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--line);
      text-decoration: none;
      transition: border-color 300ms ease, color 300ms ease;
      align-self: flex-start;
    }
    .back-btn:hover {
      border-color: var(--txt);
      color: var(--txt);
    }


    /* ── mobile ── */
    @media (max-width: 900px) {
      .nav-capsule {
        top: auto;
        bottom: 20px;
        width: calc(100% - 40px);
        gap: 20px;
        padding: 10px 20px;
      }
      .nav-logo svg { width: 60px; }
      .nav-links { gap: 24px; }
      .nav-links a { font-size: 13px; letter-spacing: 0.1em; }

      .dot-grid { background-size: 24px 24px; }

      /* project layout: mobile stacked */
      .content {
        display: flex;
        flex-direction: column;
        height: auto;
        min-height: 100vh;
        padding: 90px 36px 120px;
        gap: 0;
      }
      .proj-body {
        padding: 40px 24px 100px;
      }
      .proj-left {
        padding: 0 0 20px;
        order: 2;
      }
      .proj-title {
        writing-mode: horizontal-tb;
        transform: none;
        font-size: clamp(22px, 6vw, 36px);
      }
      .proj-center {
        padding: 0 0 24px;
        order: 1;
        height: 50vw;
        min-height: 200px;
        flex: none;
      }
      .proj-img-placeholder {
        flex: none;
        height: 100%;
      }
      .proj-right {
        padding: 0;
        order: 3;
        gap: 1.4rem;
      }
    }
  </style>
</head>
<body>

<!-- background dot grid -->
<div class="denim-texture" aria-hidden="true"></div>
<div class="dot-grid" aria-hidden="true"></div>
<img class="bg-blur" src="src/bg_blur.svg" alt="" aria-hidden="true">

<!-- nav capsule -->
<header class="nav-capsule" role="banner">
  <a href="index.html" class="nav-logo" aria-label="Nufik home">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 751.5 208.1">
      <polygon class="st0" points="157.1 118.1 55.5 9 0 9 0 205.3 51 205.3 51 83 56.4 83 170.2 205.3 208.1 205.3 208.1 9 157.1 9 157.1 118.1"/>
      <path class="st0" d="M333.9,129c0,7.3-1.4,13.7-4.1,19.1-2.7,5.4-6.4,9.6-11.1,12.5-4.7,2.9-9.9,4.3-15.7,4.3s-14.2-2.5-18.5-7.4c-4.3-5-6.5-12.2-6.5-21.7v-70.7h-46.6v80.8c0,19.3,4.9,34.5,14.7,45.6,9.8,11.1,23,16.7,39.7,16.7s20.5-2.5,28.9-7.4c8-4.7,14.4-11.5,19.1-20.3v24.9s46.6,0,46.6,0V65.1h-46.6v63.9Z"/>
      <rect class="st0" x="257.1" y="9" width="99" height="32.5"/>
      <polygon class="st0" points="751.5 205.3 682.8 132.5 745.6 65.1 688.1 65.1 624.5 125.6 624.5 9 577.7 9 577.7 205.3 624.5 205.3 624.5 141.6 691.8 205.3 751.5 205.3"/>
      <path class="st0" d="M530.8,111.9h-23.4v-23.4h23.4v-23.4h-67.2v-4.8c0-6.9,2.2-12.3,6.6-16.1,4.4-3.8,11.8-5.8,22.3-5.8s16.8.8,25.8,2.4c9,1.6,17.8,3.9,26.4,6.9h.8V7.9c-7.1-2.2-15.7-4.1-25.8-5.6-10.1-1.5-19.4-2.2-28-2.2-16.8,0-30.9,2.5-42.1,7.4-11.2,5-19.5,11.9-24.8,20.9-5.3,9-8,19.5-8,31.7v5h-18.8v46.9h18.8v93.4h46.8v-93.4h43.8v93.4h46.8v-116.8h-23.4v23.4Z"/>
    </svg>
  </a>
  <nav>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Work</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>


<!-- project detail content -->
<div class="content" id="content">
  <div class="proj-left"></div>
  <div class="proj-center">
    <div class="proj-img-placeholder" id="projCoverWrap">
      <img id="projCover" alt="" style="width:100%;height:100%;object-fit:cover;display:none;">
      <span class="proj-img-label" id="projCoverLabel">Image</span>
    </div>
  </div>
  <div class="proj-right">
    <h1 class="proj-title" id="projTitle">Project</h1>
    <div class="proj-meta-group">
      <div class="proj-meta-label">Category</div>
      <div class="proj-meta-value" id="projCategory">—</div>
    </div>
    <div class="proj-meta-group">
      <div class="proj-meta-label">Year</div>
      <div class="proj-meta-value" id="projYear">—</div>
    </div>
    <div class="proj-meta-group">
      <div class="proj-meta-label">Description</div>
      <div class="proj-desc" id="projDesc">Selected works available on request.</div>
    </div>
    <a class="back-btn" href="index.html">← Back</a>
  </div>
</div>

<!-- project body (case study content blocks) -->
<section class="proj-body" id="projBody"></section>

<script>
  // Load project from data/projects.json by slug param
  (async function loadProject() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');
    if (!slug) {
      document.getElementById('projTitle').textContent = 'Project not found';
      return;
    }
    let project;
    try {
      const res = await fetch('data/projects.json', { cache: 'no-cache' });
      const projects = await res.json();
      project = projects.find(p => p.slug === slug);
    } catch (e) {
      console.error('Failed to load projects.json:', e);
      document.getElementById('projTitle').textContent = 'Failed to load';
      return;
    }
    if (!project) {
      document.getElementById('projTitle').textContent = 'Project not found';
      return;
    }

    // Hero (title, cover, meta)
    document.title = `${project.name} — Nūfik`;
    document.getElementById('projTitle').textContent    = project.name || '';
    document.getElementById('projCategory').textContent = project.category || '—';
    document.getElementById('projYear').textContent     = project.year || '—';
    document.getElementById('projDesc').textContent     = project.description || '';

    if (project.cover) {
      const coverImg = document.getElementById('projCover');
      coverImg.src = project.cover;
      coverImg.alt = project.name || '';
      coverImg.style.display = 'block';
      document.getElementById('projCoverLabel').style.display = 'none';
    }

    // Body blocks
    renderBody(project.content || []);
  })();

  function renderBody(blocks) {
    const root = document.getElementById('projBody');
    if (!blocks.length) {
      root.innerHTML = '<div class="pb-empty">No additional content.</div>';
      requestAnimationFrame(() => root.classList.add('visible'));
      return;
    }
    const frag = document.createDocumentFragment();
    for (const b of blocks) {
      frag.appendChild(renderBlock(b));
    }
    root.appendChild(frag);
    requestAnimationFrame(() => root.classList.add('visible'));
  }

  function renderBlock(b) {
    switch (b.type) {
      case 'heading': {
        const el = document.createElement('h2');
        el.className = 'pb-heading' + (b.level === 3 ? ' lvl-3' : '');
        el.textContent = b.text || '';
        return el;
      }
      case 'paragraph': {
        const el = document.createElement('p');
        el.className = 'pb-paragraph';
        el.textContent = b.text || '';
        return el;
      }
      case 'quote': {
        const el = document.createElement('blockquote');
        el.className = 'pb-quote';
        el.textContent = b.text || '';
        return el;
      }
      case 'list': {
        const el = document.createElement(b.style === 'numbered' ? 'ol' : 'ul');
        el.className = 'pb-list';
        for (const item of (b.items || [])) {
          const li = document.createElement('li');
          li.textContent = item;
          el.appendChild(li);
        }
        return el;
      }
      case 'divider': {
        const el = document.createElement('hr');
        el.className = 'pb-divider';
        return el;
      }
      case 'image': {
        const wrap = document.createElement('figure');
        wrap.className = 'pb-media';
        const img = document.createElement('img');
        img.src = b.src;
        img.alt = b.caption || '';
        img.loading = 'lazy';
        img.decoding = 'async';
        wrap.appendChild(img);
        if (b.caption) {
          const cap = document.createElement('figcaption');
          cap.className = 'pb-caption';
          cap.textContent = b.caption;
          wrap.appendChild(cap);
        }
        return wrap;
      }
      case 'video': {
        const wrap = document.createElement('figure');
        wrap.className = 'pb-media';
        const v = document.createElement('video');
        v.src = b.src;
        v.muted = b.muted !== false;
        v.loop = b.loop !== false;
        v.playsInline = true;
        v.autoplay = true;
        v.preload = 'metadata';
        // Pause when off-screen to save battery/bandwidth
        const io = new IntersectionObserver(entries => {
          for (const e of entries) {
            if (e.isIntersecting) v.play().catch(() => {});
            else v.pause();
          }
        }, { threshold: 0.25 });
        io.observe(v);
        wrap.appendChild(v);
        if (b.caption) {
          const cap = document.createElement('figcaption');
          cap.className = 'pb-caption';
          cap.textContent = b.caption;
          wrap.appendChild(cap);
        }
        return wrap;
      }
      default: {
        const el = document.createElement('div');
        return el;
      }
    }
  }

  // Fade-in animation
  requestAnimationFrame(() => {
    setTimeout(() => document.getElementById('content').classList.add('visible'), 130);
  });
</script>
<script>
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('dragstart', e => e.preventDefault());
</script>
</body>
</html>
